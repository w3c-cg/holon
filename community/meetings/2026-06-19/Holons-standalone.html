n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 26: AI AUTHORING & HOLON BRIDGES -->\n  <section data-label=\"AI Authoring &amp; Bridges\" data-screen-label=\"31 — AI Authoring &amp; Bridges\" data-speaker-notes=\"AI systems can also be used to help compose both data-centered and holon databooks, using a skills.md architecture alongside MCP. This minimises the cost and complexity of authoring considerably. Holon Bridges provide mechanisms for retrieving and updating data stores, especially when coupled with agentic systems and chat. Dialog-based AI especially benefits from the cues databooks provide when generating final output.\">\n    <div style=\"background: var(--bg2); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 520px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--teal);\">Authoring &amp; Retrieval<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">AI as author and bridge<\u002Fh2>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.6; opacity: 0.85; text-wrap: pretty;\">AI reduces the cost of composing holons — and holon architecture enables better AI output.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 28px;\">\n        <!-- AI Composition card -->\n        <div style=\"background: oklch(16% 0.05 195); border-radius: 8px; padding: 36px 44px; display: flex; flex-direction: column; gap: 18px; border-left: 3px solid var(--teal);\">\n          <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 44px; font-style: italic; font-weight: 300; color: var(--fg); margin: 0; line-height: 1.15;\">AI Composition<\u002Fp>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.6; text-wrap: pretty;\">AI systems can compose data-centered and holon databooks using a <span style=\"color: var(--teal);\">skills.md architecture<\u002Fspan> alongside MCP — minimising authoring cost and complexity considerably.<\u002Fp>\n        <\u002Fdiv>\n        <!-- Holon Bridges card -->\n        <div style=\"background: oklch(18% 0.06 72); border-radius: 8px; padding: 36px 44px; display: flex; flex-direction: column; gap: 18px; border-left: 3px solid var(--gold);\">\n          <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 44px; font-style: italic; font-weight: 300; color: var(--fg); margin: 0; line-height: 1.15;\">Holon Bridges<\u002Fp>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.6; text-wrap: pretty;\">Provide mechanisms for retrieving and updating data stores — especially coupled with <span style=\"color: var(--gold);\">agentic systems<\u002Fspan> and chat. Dialog-based AI benefits from the cues databooks provide when generating final output.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 27: ARENAS -->\n  <section data-label=\"Arenas for Holons\" data-screen-label=\"32 — Arenas for Holons\" data-speaker-notes=\"Holons provide a structured foundation for complex, stateful systems across many domains.\">\n    <div style=\"background: var(--bg); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 420px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Applications<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">Arenas for holons<\u002Fh2>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.6; opacity: 0.85; text-wrap: pretty;\">Holons provide a foundation for complex, stateful, narrative-driven systems across a wide range of domains.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 20px 60px; align-content: center;\">\n        <div style=\"display: flex; gap: 16px; align-items: center;\"><div style=\"width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex: none;\"><\u002Fdiv><span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg);\">Media &amp; gaming<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; gap: 16px; align-items: center;\"><div style=\"width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex: none;\"><\u002Fdiv><span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg);\">Journalism &amp; education<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; gap: 16px; align-items: center;\"><div style=\"width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex: none;\"><\u002Fdiv><span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg);\">Decision support<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; gap: 16px; align-items: center;\"><div style=\"width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex: none;\"><\u002Fdiv><span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg);\">Marketing &amp; market tracking<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; gap: 16px; align-items: center;\"><div style=\"width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex: none;\"><\u002Fdiv><span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg);\">Supply chain management<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; gap: 16px; align-items: center;\"><div style=\"width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex: none;\"><\u002Fdiv><span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg);\">Financial system monitoring<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; gap: 16px; align-items: center;\"><div style=\"width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex: none;\"><\u002Fdiv><span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg);\">Medical system monitoring<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; gap: 16px; align-items: center;\"><div style=\"width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex: none;\"><\u002Fdiv><span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg);\">Distributed private data meshes<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; gap: 16px; align-items: center;\"><div style=\"width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex: none;\"><\u002Fdiv><span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg);\">Robotic &amp; drone traffic control<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; gap: 16px; align-items: center;\"><div style=\"width: 8px; height: 8px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.4); flex: none;\"><\u002Fdiv><span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); font-style: italic;\">Many others<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 28: GOALS -->\n  <section data-label=\"Community Group Goals\" data-screen-label=\"33 — Community Group Goals\" data-speaker-notes=\"The Holon Community Group has four core goals: refine the models, establish conventions, identify implementations and points of commonality, and develop the foundations for a federated distributed data web built on top of the World Wide Web.\">\n    <div style=\"background: var(--bg-cool); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 460px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--teal);\">Community<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">Goals for the Holon Community Group<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; flex-direction: column; gap: var(--gap-md); justify-content: center;\">\n        <div style=\"display: flex; align-items: flex-start; gap: 32px;\">\n          <span style=\"font-family: 'Cormorant Garamond', serif; font-size: 64px; color: var(--teal); font-weight: 300; line-height: 1; flex: 0 0 52px;\">1<\u002Fspan>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.5;\">Refine these models<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"height: 1px; background: oklch(65% 0.10 195 / 0.12); margin-left: 84px;\"><\u002Fdiv>\n        <div style=\"display: flex; align-items: flex-start; gap: 32px;\">\n          <span style=\"font-family: 'Cormorant Garamond', serif; font-size: 64px; color: var(--teal); font-weight: 300; line-height: 1; flex: 0 0 52px;\">2<\u002Fspan>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.5; text-wrap: pretty;\">Establish conventions for messaging and holon core architectures<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"height: 1px; background: oklch(65% 0.10 195 / 0.12); margin-left: 84px;\"><\u002Fdiv>\n        <div style=\"display: flex; align-items: flex-start; gap: 32px;\">\n          <span style=\"font-family: 'Cormorant Garamond', serif; font-size: 64px; color: var(--teal); font-weight: 300; line-height: 1; flex: 0 0 52px;\">3<\u002Fspan>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.5; text-wrap: pretty;\">Identify potential implementations and points of commonality between them<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"height: 1px; background: oklch(65% 0.10 195 / 0.12); margin-left: 84px;\"><\u002Fdiv>\n        <div style=\"display: flex; align-items: flex-start; gap: 32px;\">\n          <span style=\"font-family: 'Cormorant Garamond', serif; font-size: 64px; color: var(--teal); font-weight: 300; line-height: 1; flex: 0 0 52px;\">4<\u002Fspan>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.5; text-wrap: pretty;\">Develop the foundations for a federated distributed data web, built on top of the World Wide Web<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"height: 1px; background: oklch(65% 0.10 195 / 0.12); margin-left: 84px;\"><\u002Fdiv>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; margin-left: 84px; line-height: 1.65; text-wrap: pretty; font-style: italic;\">Year-one success: agreed core vocabulary, at least one reference implementation, and a stable databook format specification open to all participants.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 29: CONSIDERATIONS -->\n  <section data-label=\"Considerations\" data-screen-label=\"34 — Considerations\" data-speaker-notes=\"Three key considerations for the community group: the focus is on interoperability, data-format agnostic architecture even if early implementations use RDF 1.2. The HCG specifications are not a W3C Endorsed Recommendation yet, though parts may be presented to the W3C later. IP rights policies are yet to be decided, likely following W3C licensing conventions.\">\n    <div style=\"background: var(--bg2); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 420px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Process<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">Considerations<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; flex-direction: column; gap: 32px; justify-content: center;\">\n        <div style=\"background: oklch(16% 0.05 72); border-radius: 8px; padding: 32px 40px; display: flex; flex-direction: column; gap: 12px; border-left: 3px solid var(--gold);\">\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--gold); font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em;\">Interoperability<\u002Fspan>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg); margin: 0; line-height: 1.6; text-wrap: pretty;\">Focus is on interoperability. While early implementations will likely use the RDF 1.2 stack, the architecture itself should be data-format agnostic.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: oklch(16% 0.05 72); border-radius: 8px; padding: 32px 40px; display: flex; flex-direction: column; gap: 12px; border-left: 3px solid var(--gold);\">\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--gold); font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em;\">W3C Status<\u002Fspan>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg); margin: 0; line-height: 1.6; text-wrap: pretty;\">HCG specifications are not a W3C Endorsed Recommendation, though parts may be presented to the W3C for consideration under their processes at a later date.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: oklch(16% 0.05 72); border-radius: 8px; padding: 32px 40px; display: flex; flex-direction: column; gap: 12px; border-left: 3px solid var(--gold);\">\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--gold); font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em;\">IP Rights<\u002Fspan>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg); margin: 0; line-height: 1.6; text-wrap: pretty;\">IP rights policies are yet to be decided, though likely will align with W3C policies with regard to licensing.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 30: WORKING GROUPS -->\n  <section data-label=\"Working Groups\" data-screen-label=\"35 — Working Groups\" data-speaker-notes=\"Five working groups are proposed within the community group: Holon Core Architecture, Databooks, Holon Network Architecture, Validation/Verification/Security Patterns, and Industry Utilisation. Suggestions are open for other groups, or for consolidating these.\">\n    <div style=\"background: var(--bg); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 460px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Organisation<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">Working groups<\u002Fh2>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.7; text-wrap: pretty; font-style: italic;\">Suggestions are open for other groups, or for consolidating these.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; flex-direction: column; gap: 20px; justify-content: center;\">\n        <div style=\"display: flex; align-items: flex-start; gap: 28px; padding: 20px 36px; background: oklch(16% 0.06 72); border-radius: 6px; border-left: 3px solid var(--gold);\">\n          <span style=\"font-family: 'Cormorant Garamond', serif; font-size: 40px; color: var(--gold); font-weight: 300; line-height: 1.3; flex: 0 0 32px;\">I<\u002Fspan>\n          <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); font-weight: 300;\">Holon Core Architecture<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); font-style: italic; line-height: 1.4;\">Define the canonical holon model, vocabulary, and reference patterns across implementations.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; align-items: flex-start; gap: 28px; padding: 20px 36px; background: oklch(16% 0.06 72); border-radius: 6px; border-left: 3px solid var(--gold);\">\n          <span style=\"font-family: 'Cormorant Garamond', serif; font-size: 40px; color: var(--gold); font-weight: 300; line-height: 1.3; flex: 0 0 32px;\">II<\u002Fspan>\n          <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); font-weight: 300;\">Databooks<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); font-style: italic; line-height: 1.4;\">Establish the databook format specification — metadata conventions, code block patterns, and exchange protocols.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; align-items: flex-start; gap: 28px; padding: 20px 36px; background: oklch(16% 0.06 72); border-radius: 6px; border-left: 3px solid var(--gold);\">\n          <span style=\"font-family: 'Cormorant Garamond', serif; font-size: 40px; color: var(--gold); font-weight: 300; line-height: 1.3; flex: 0 0 32px;\">III<\u002Fspan>\n          <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); font-weight: 300;\">Holon Network Architecture<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); font-style: italic; line-height: 1.4;\">Design federation and distribution protocols for connected holon systems across the web.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; align-items: flex-start; gap: 28px; padding: 20px 36px; background: oklch(16% 0.06 72); border-radius: 6px; border-left: 3px solid var(--gold);\">\n          <span style=\"font-family: 'Cormorant Garamond', serif; font-size: 40px; color: var(--gold); font-weight: 300; line-height: 1.3; flex: 0 0 32px;\">IV<\u002Fspan>\n          <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); font-weight: 300;\">Validation / Verification / Security Patterns<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); font-style: italic; line-height: 1.4;\">Define constraint languages, verification rules, and security boundaries — SHACL and beyond.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; align-items: flex-start; gap: 28px; padding: 20px 36px; background: oklch(16% 0.06 72); border-radius: 6px; border-left: 3px solid var(--gold);\">\n          <span style=\"font-family: 'Cormorant Garamond', serif; font-size: 40px; color: var(--gold); font-weight: 300; line-height: 1.3; flex: 0 0 32px;\">V<\u002Fspan>\n          <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); font-weight: 300;\">Industry Utilisation<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); font-style: italic; line-height: 1.4;\">Develop domain-specific profiles and reference implementations for target sectors.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE: MEETING CADENCE -->\n  <section data-label=\"Meeting Cadence\" data-screen-label=\"36 — Meeting Cadence\" data-speaker-notes=\"The Holon Community Group meets twice monthly on alternating Fridays, 7 to 9 AM Pacific, which is 3 to 5 PM GMT and 4 to 6 PM Central European Time — accessible to Western and Central Europe without unreasonable early starts on the Pacific coast. A third monthly session will be scheduled for participants in Eastern Europe, the Middle East, and Asia-Pacific, once membership distribution is established. All meetings are open to members; agendas are published to the GitHub repository at least 48 hours in advance, and minutes within one week. Working groups meet at their own cadence and report at each plenary.\">\n    <div style=\"background: var(--bg2); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 460px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Logistics<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">Meeting cadence<\u002Fh2>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.7; text-wrap: pretty;\">Working groups meet independently at cadences agreed by their members, and report to the full group at each plenary session.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; flex-direction: column; gap: 24px; justify-content: center;\">\n        <div style=\"background: oklch(16% 0.06 72); border-radius: 8px; padding: 32px 40px; display: flex; flex-direction: column; gap: 16px; border-left: 3px solid var(--gold);\">\n          <div style=\"display: flex; align-items: baseline; gap:
