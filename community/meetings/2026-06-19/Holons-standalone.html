document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

weight: 500;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"6f646650-7516-4a04-99cb-d3ce408e68f8\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 500;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"9697b160-6412-4f78-9a4a-83c95ae2bcb3\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 500;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"2c5b8130-1555-45ab-b513-f5cbaa373389\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 500;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"8f83ad39-3ff3-47f6-8067-6d38ce4d134c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 500;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"c34851c7-ac5b-4038-a186-add40d5747b5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    :root {\n      --type-display: 120px;\n      --type-title: 76px;\n      --type-h2: 56px;\n      --type-body: 36px;\n      --type-small: 28px;\n      --type-label: 24px;\n      --pad-x: 120px;\n      --pad-y: 96px;\n      --gap-lg: 48px;\n      --gap-md: 32px;\n      --bg: #0E0C0A;\n      --bg2: #181512;\n      --bg-warm: oklch(22% 0.07 72);\n      --bg-cool: oklch(18% 0.05 195);\n      --fg: #EDE8E1;\n      --fg-dim: oklch(55% 0.02 72);\n      --gold: oklch(74% 0.14 74);\n      --teal: oklch(65% 0.10 195);\n    }\n    body { margin: 0; padding: 0; background: #0E0C0A; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<x-import component-from-global-scope=\"deck-stage\" from=\"4c7bd490-efc6-456d-ba6a-6c6e4d400bb2#/deck-stage.js\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\">\n\n  <!-- SLIDE 01: TITLE -->\n  <section data-label=\"Title\" data-screen-label=\"01 — Title\" data-speaker-notes=\"Welcome. Today we're exploring one of the most quietly profound ideas in science and philosophy — the concept of the holon. By the end of this talk, you'll start seeing this pattern everywhere.\">\n    <div style=\"background: var(--bg); width: 100%; height: 100%; display: flex; align-items: center;\">\n      <div style=\"padding: 0 var(--pad-x); flex: 1; display: flex; flex-direction: column; gap: 28px;\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold);\">Systems Thinking<\u002Fspan>\n        <h1 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-display); font-weight: 300; color: var(--fg); line-height: 0.92; margin: 0; letter-spacing: -2px;\">Holons<\u002Fh1>\n        <div style=\"width: 80px; height: 1px; background: var(--gold); opacity: 0.7;\"><\u002Fdiv>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-h2); font-weight: 300; color: var(--fg); margin: 0; opacity: 0.75; letter-spacing: 0.04em;\">An Introduction<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 0 0 580px; height: 100%; display: flex; align-items: center; justify-content: center;\">\n        <div style=\"position: relative; width: 520px; height: 520px;\">\n          <div style=\"position: absolute; inset: 0; border-radius: 50%; border: 1px solid oklch(74% 0.14 74 / 0.12);\"><\u002Fdiv>\n          <div style=\"position: absolute; inset: 52px; border-radius: 50%; border: 1px solid oklch(74% 0.14 74 / 0.22);\"><\u002Fdiv>\n          <div style=\"position: absolute; inset: 104px; border-radius: 50%; border: 1px solid oklch(74% 0.14 74 / 0.38);\"><\u002Fdiv>\n          <div style=\"position: absolute; inset: 156px; border-radius: 50%; border: 1px solid oklch(74% 0.14 74 / 0.55);\"><\u002Fdiv>\n          <div style=\"position: absolute; inset: 208px; border-radius: 50%; border: 1px solid oklch(74% 0.14 74 / 0.72); background: oklch(74% 0.14 74 / 0.04);\"><\u002Fdiv>\n          <div style=\"position: absolute; inset: 260px; border-radius: 50%; border: 2px solid var(--gold); background: oklch(74% 0.14 74 / 0.18);\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 02: WHAT IS A HOLON? -->\n  <section data-label=\"What Is a Holon?\" data-screen-label=\"02 — What Is a Holon?\" data-speaker-notes=\"At its core, a holon is something that is simultaneously a complete whole AND a part of something larger. Koestler coined the word from the Greek holos — whole — and the suffix -on, meaning particle or part.\">\n    <div style=\"background: var(--bg); width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 52px;\">\n      <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); align-self: flex-start;\">Definition<\u002Fspan>\n      <div style=\"display: flex; align-items: stretch; width: 100%; gap: 3px; height: 260px;\">\n        <div style=\"flex: 1; background: oklch(22% 0.07 72); border-radius: 4px 0 0 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;\">\n          <span style=\"font-family: 'Cormorant Garamond', serif; font-size: 72px; font-weight: 300; color: var(--fg); letter-spacing: -1px;\">Whole<\u002Fspan>\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim);\">complete in itself<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"width: 3px; background: var(--gold); opacity: 0.6; flex: none;\"><\u002Fdiv>\n        <div style=\"flex: 1; background: oklch(18% 0.05 195); border-radius: 0 4px 4px 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;\">\n          <span style=\"font-family: 'Cormorant Garamond', serif; font-size: 72px; font-weight: 300; color: var(--fg); letter-spacing: -1px;\">Part<\u002Fspan>\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim);\">member of a larger whole<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; text-align: center; opacity: 0.9; max-width: 1100px; text-wrap: pretty; line-height: 1.5;\">A holon is any entity that is <span style=\"color: var(--gold);\">simultaneously<\u002Fspan> a whole in its own right and a part of a larger system — neither purely reducible, nor purely independent.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 03: ARTHUR KOESTLER -->\n  <section data-label=\"Arthur Koestler\" data-screen-label=\"03 — Arthur Koestler\" data-speaker-notes=\"Koestler introduced this concept in The Ghost in the Machine, published in 1967. He was wrestling with a deep puzzle: how can something be both autonomous and dependent at the same time? His answer: it always is both, simultaneously — and we simply hadn't had a word for that until now.\">\n    <div style=\"background: var(--bg2); width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: var(--pad-y) 200px; box-sizing: border-box; gap: 40px;\">\n      <div style=\"width: 60px; height: 1px; background: var(--gold); opacity: 0.5;\"><\u002Fdiv>\n      <blockquote style=\"font-family: 'Cormorant Garamond', serif; font-size: 56px; font-style: italic; font-weight: 300; color: var(--fg); margin: 0; text-align: center; line-height: 1.4; max-width: 1380px; text-wrap: pretty;\">\"I have coined the word <span style=\"color: var(--gold); font-style: normal;\">holon<\u002Fspan> for these Janus-faced entities which are simultaneously wholes and parts.\"<\u002Fblockquote>\n      <div style=\"width: 60px; height: 1px; background: var(--gold); opacity: 0.5;\"><\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 8px;\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); font-weight: 500; color: var(--fg); letter-spacing: 0.04em;\">Arthur Koestler<\u002Fspan>\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim);\">The Ghost in the Machine, 1967<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 04: TWO TENDENCIES -->\n  <section data-label=\"Two Tendencies\" data-screen-label=\"04 — Two Tendencies\" data-speaker-notes=\"Koestler identified two opposing but complementary tendencies in every holon. The self-assertive tendency preserves its own identity and autonomy. The integrative tendency allows it to function as a part of something larger. Both must coexist — remove either and the system either fragments or is absorbed.\">\n    <div style=\"background: var(--bg); width: 100%; height: 100%; display: flex; flex-direction: column; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: var(--gap-lg);\">\n      <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">The Janus Face<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">Every holon has two tendencies<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; gap: 40px; align-items: stretch;\">\n        <div style=\"flex: 1; background: oklch(22% 0.07 72); border-radius: 6px; padding: 52px; display: flex; flex-direction: column; gap: 24px;\">\n          <div style=\"display: flex; align-items: center; gap: 16px;\">\n            <div style=\"width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex: none;\"><\u002Fdiv>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); font-weight: 500; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase;\">Self-assertive<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 52px; font-weight: 300; color: var(--fg); margin: 0; line-height: 1.25; font-style: italic;\">Acts as an autonomous whole<\u002Fp>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.65; text-wrap: pretty;\">Maintains its own identity, structure, and rules. Resists being dissolved into the larger system. Preserves its boundaries.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"flex: 1; background: oklch(18% 0.05 195); border-radius: 6px; padding: 52px; display: flex; flex-direction: column; gap: 24px;\">\n          <div style=\"display: flex; align-items: center; gap: 16px;\">\n            <div style=\"width: 8px; height: 8px; border-radius: 50%; background: var(--teal); flex: none;\"><\u002Fdiv>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); font-weight: 500; color: var(--teal); letter-spacing: 0.1em; text-transform: uppercase;\">Integrative<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 52px; font-weight: 300; color: var(--fg); margin: 0; line-height: 1.25; font-style: italic;\">Acts as a dependent part<\u002Fp>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.65; text-wrap: pretty;\">Cooperates and coordinates with other holons. Subordinates itself to the needs of the larger system. Enables collective function.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 05: HOLARCHIES -->\n  <section data-label=\"Holarchies\" data-screen-label=\"05 — Holarchies\" data-speaker-notes=\"When holons are nested within holons, the resulting structure is called a holarchy. Unlike a traditional hierarchy that privileges the top, a holarchy treats every level as equally real — just differently scoped. There is no absolute top or bottom.\">\n    <div style=\"background: var(--bg2); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 580px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Structure<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">The Holarchy<\u002Fh2>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.6; opacity: 0.85; text-wrap: pretty;\">When holons nest within holons, the structure is called a <span style=\"color: var(--gold);\">holarchy<\u002Fspan>.<\u002Fp>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.7; text-wrap: pretty;\">Every level is equally real — just differently scoped. Each ring is simultaneously a container and a contained.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; align-items: center; justify-content: center;\">\n        <div style=\"position: relative; width: 680px; height: 680px;\">\n          <div style=\"position: absolute; inset: 0; border-radius: 50%; border: 1.5px solid oklch(74% 0.14 74 / 0.18);\"><\u002Fdiv>\n          <span style=\"position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.5); white-space: nowrap;\">Society<\u002Fspan>\n          <div style=\"position: absolute; inset: 90px; border-radius: 50%; border: 1.5px solid oklch(74% 0.14 74 / 0.32);\"><\u002Fdiv>\n          <span style=\"position: absolute; top: 110px; left: 50%; transform: translateX(-50%); font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.65); white-space: nowrap;\">Organization<\u002Fspan>\n          <div style=\"position: absolute; inset: 180px; border-radius: 50%; border: 1.5px solid oklch(74% 0.14 74 / 0.50);\"><\u002Fdiv>\n          <span style=\"position: absolute; top: 200px; left: 50%; transform: translateX(-50%); font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.8); white-space: nowrap;\">Team<\u002Fspan>\n          <div style=\"position: absolute; inset: 260px; border-radius: 50%; border: 1.5px solid oklch(74% 0.14 74 / 0.7);\"><\u002Fdiv>\n          <span style=\"position: absolute; top: 278px; left: 50%; transform: translateX(-50%); font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg); white-space: nowrap;\">Individual<\u002Fspan>\n          <div style=\"position: absolute; inset: 290px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--bg); font-weight: 500; white-space: nowrap;\">Cell<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 06: NATURE'S HOLARCHY -->\n  <section data-label=\"Nature's Holarchy\" data-screen-label=\"06 — Nature's Holarchy\" data-speaker-notes=\"Nature is the original holarchist. The chain from atoms to ecosystems is a perfect holarchy. Each level is complete and functional at its scale, and each is a component of a larger system. Remove any level and the whole falls apart.\">\n    <div style=\"background: var(--bg-warm); width: 100%; height: 100%; display: flex; flex-direction: column; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: var(--gap-md);\">\n      <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Nature<\u002Fspan>\n      <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0;\">Nature's holarchy<\u002Fh2>\n      <div style=\"flex: 1; display: flex; align-items: center; justify-content: space-between;\">\n        <div style=\"flex: 1; display: flex; flex-direction: column; align-items: center; gap: 24px;\">\n          <div style=\"width: 88px; height: 88px; border-radius: 50%; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center;\">\n            <div style=\"width: 18px; height: 18px; border-radius: 50%; background: var(--gold);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg);\">Atom<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"flex: 0 0 48px; text-align: center; color: oklch(74% 0.14 74 / 0.4); font-size: 32px; font-family: 'IBM Plex Sans', sans-serif;\">→<\u002Fdiv>\n        <div style=\"flex: 1; display: flex; flex-direction: column; align-items: center; gap: 24px;\">\n          <div style=\"width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--gold); background: oklch(74% 0.14 74 / 0.07); display: flex; align-items: center; justify-content: center; gap: 8px;\">\n            <div style=\"width: 14px; height: 14px; border-radius: 50%; background: var(--gold); opacity: 0.6;\"><\u002Fdiv>\n            <div style=\"width: 14px; height: 14px; border-radius: 50%; background: var(--gold);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg);\">Molecule<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"flex: 0 0 48px; text-align: center; color: oklch(74% 0.14 74 / 0.4); font-size: 32px; font-family: 'IBM Plex Sans', sans-serif;\">→<\u002Fdiv>\n        <div style=\"flex: 1; display: flex; flex-direction: column; align-items: center; gap: 24px;\">\n          <div style=\"width: 110px; height: 110px; border-radius: 40%; border: 2px solid var(--gold); background: oklch(74% 0.14 74 / 0.10); display: flex; align-items: center; justify-content: center;\">\n            <div style=\"width: 30px; height: 30px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.5);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg);\">Cell<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"flex: 0 0 48px; text-align: center; color: oklch(74% 0.14 74 / 0.4); font-size: 32px; font-family: 'IBM Plex Sans', sans-serif;\">→<\u002Fdiv>\n        <div style=\"flex: 1; display: flex; flex-direction: column; align-items: center; gap: 24px;\">\n          <div style=\"width: 120px; height: 120px; border-radius: 28px; border: 2px solid var(--gold); background: oklch(74% 0.14 74 / 0.13); display: flex; align-items: center; justify-content: center;\">\n            <div style=\"width: 42px; height: 42px; border-radius: 40%; background: oklch(74% 0.14 74 / 0.45);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg);\">Organ<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"flex: 0 0 48px; text-align: center; color: oklch(74% 0.14 74 / 0.4); font-size: 32px; font-family: 'IBM Plex Sans', sans-serif;\">→<\u002Fdiv>\n        <div style=\"flex: 1; display: flex; flex-direction: column; align-items: center; gap: 24px;\">\n          <div style=\"width: 132px; height: 132px; border-radius: 50%; border: 2px solid var(--gold); background: oklch(74% 0.14 74 / 0.17); display: flex; align-items: center; justify-content: center;\">\n            <div style=\"width: 52px; height: 52px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.4);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg);\">Organism<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"flex: 0 0 48px; text-align: center; color: oklch(74% 0.14 74 / 0.4); font-size: 32px; font-family: 'IBM Plex Sans', sans-serif;\">→<\u002Fdiv>\n        <div style=\"flex: 1; display: flex; flex-direction: column; align-items: center; gap: 24px;\">\n          <div style=\"width: 144px; height: 144px; border-radius: 8px; border: 2px solid var(--gold); background: oklch(74% 0.14 74 / 0.20); display: flex; align-items: center; justify-content: center;\">\n            <div style=\"width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--gold); background: oklch(74% 0.14 74 / 0.3);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg);\">Ecosystem<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); margin: 0; text-align: center; font-style: italic;\">Each level is complete in itself — and a component of the level above.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 07: ORGANIZATIONS -->\n  <section data-label=\"Organizations\" data-screen-label=\"07 — Organizations\" data-speaker-notes=\"Organizations are holarchies too. Each individual is a whole person, also a member of a team, which is part of a department, part of a company. Real-world applications include Holacracy and Team organizations — both distribute authority while maintaining coherence, because they treat every role as a holon.\">\n    <div style=\"background: var(--bg); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 560px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Organizations<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">The workplace as holarchy<\u002Fh2>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.6; opacity: 0.85; text-wrap: pretty;\">Every employee is simultaneously an autonomous individual and a member of team, department, and company.<\u002Fp>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.7; text-wrap: pretty;\"><span style=\"color: var(--gold);\">Holacracy<\u002Fspan> and <span style=\"color: var(--gold);\">Team organizations<\u002Fspan> are built on exactly this recognition — distributing authority while preserving coherence.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; align-items: center; justify-content: center;\">\n        <div style=\"position: relative; width: 700px; height: 600px;\">\n          <div style=\"position: absolute; inset: 0; border: 1.5px solid oklch(74% 0.14 74 / 0.18); border-radius: 12px; display: flex; align-items: flex-start; padding: 20px 28px;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.45);\">Industry<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"position: absolute; inset: 60px; border: 1.5px solid oklch(74% 0.14 74 / 0.32); border-radius: 10px; display: flex; align-items: flex-start; padding: 20px 28px;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.62);\">Company<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"position: absolute; inset: 120px; border: 1.5px solid oklch(74% 0.14 74 / 0.50); border-radius: 8px; display: flex; align-items: flex-start; padding: 20px 28px;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.78);\">Department<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"position: absolute; inset: 180px; border: 1.5px solid oklch(74% 0.14 74 / 0.68); border-radius: 6px; display: flex; align-items: flex-start; padding: 20px 28px;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg);\">Team<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"position: absolute; inset: 240px; border: 2px solid var(--gold); border-radius: 4px; background: oklch(22% 0.07 72); display: flex; align-items: center; justify-content: center;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--gold); font-weight: 500;\">Individual<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 08: EMERGENCE -->\n  <section data-label=\"Emergence\" data-screen-label=\"08 — Emergence\" data-speaker-notes=\"One of the most powerful insights from holonic thinking is emergence: each level of a holarchy has properties that simply cannot be found in its components. The whole is genuinely greater than the sum of its parts.\">\n    <div style=\"background: var(--bg-cool); width: 100%; height: 100%; display: flex; flex-direction: column; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: var(--gap-lg);\">\n      <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--teal);\">Systems Thinking<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0;\">Each level brings something new<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.5; opacity: 0.85; max-width: 960px; text-wrap: pretty;\">New properties <span style=\"color: var(--teal);\">emerge<\u002Fspan> at each level — properties the parts don't have on their own.<\u002Fp>\n      <div style=\"flex: 1; display: flex; flex-direction: column; gap: var(--gap-md); justify-content: center;\">\n        <div style=\"display: flex; align-items: baseline; gap: 40px;\">\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--teal); font-weight: 500; flex: 0 0 260px;\">H₂O molecules<\u002Fspan>\n          <span style=\"font-family: 'Cormorant Garamond', serif; font-size: 52px; color: var(--fg); font-weight: 300; font-style: italic;\">have wetness.<\u002Fspan>\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim);\">Hydrogen and oxygen atoms don't.<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"height: 1px; background: oklch(65% 0.10 195 / 0.15);\"><\u002Fdiv>\n        <div style=\"display: flex; align-items: baseline; gap: 40px;\">\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--teal); font-weight: 500; flex: 0 0 260px;\">Neural networks<\u002Fspan>\n          <span style=\"font-family: 'Cormorant Garamond', serif; font-size: 52px; color: var(--fg); font-weight: 300; font-style: italic;\">generate thought.<\u002Fspan>\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim);\">Individual neurons don't think.<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"height: 1px; background: oklch(65% 0.10 195 / 0.15);\"><\u002Fdiv>\n        <div style=\"display: flex; align-items: baseline; gap: 40px;\">\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--teal); font-weight: 500; flex: 0 0 260px;\">Communities<\u002Fspan>\n          <span style=\"font-family: 'Cormorant Garamond', serif; font-size: 52px; color: var(--fg); font-weight: 300; font-style: italic;\">produce culture.<\u002Fspan>\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim);\">Individuals alone can't create it.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 09: TECHNOLOGY -->\n  <section data-label=\"Technology\" data-screen-label=\"09 — Technology\" data-speaker-notes=\"Software engineering has independently arrived at holonic architecture. Functions, modules, services, applications, and platforms form a perfect holarchy. Microservices, component-based design, and APIs are all expressions of the same underlying principle: build things that are both self-contained and composable.\">\n    <div style=\"background: var(--bg2); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 560px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Technology<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">Software is holonic by design<\u002Fh2>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.6; opacity: 0.85; text-wrap: pretty;\">Good software is made of units that are both <span style=\"color: var(--gold);\">self-contained<\u002Fspan> and <span style=\"color: var(--gold);\">composable<\u002Fspan>.<\u002Fp>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.7; text-wrap: pretty;\">Microservices, components, and APIs are all expressions of the same holonic principle.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0;\">\n        <div style=\"width: 880px; background: oklch(22% 0.05 72); border: 1px solid oklch(74% 0.14 74 / 0.18); border-radius: 8px; padding: 24px 44px; display: flex; align-items: center; justify-content: space-between;\">\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); font-weight: 300;\">Platform<\u002Fspan>\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim);\">AWS, Kubernetes<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"width: 2px; height: 18px; background: oklch(74% 0.14 74 / 0.3);\"><\u002Fdiv>\n        <div style=\"width: 760px; background: oklch(22% 0.05 72); border: 1px solid oklch(74% 0.14 74 / 0.28); border-radius: 8px; padding: 24px 44px; display: flex; align-items: center; justify-content: space-between;\">\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); font-weight: 300;\">Application<\u002Fspan>\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim);\">web app, mobile app<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"width: 2px; height: 18px; background: oklch(74% 0.14 74 / 0.4);\"><\u002Fdiv>\n        <div style=\"width: 640px; background: oklch(22% 0.05 72); border: 1px solid oklch(74% 0.14 74 / 0.40); border-radius: 8px; padding: 24px 44px; display: flex; align-items: center; justify-content: space-between;\">\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); font-weight: 300;\">Service<\u002Fspan>\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim);\">auth, payments<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"width: 2px; height: 18px; background: oklch(74% 0.14 74 / 0.55);\"><\u002Fdiv>\n        <div style=\"width: 520px; background: oklch(22% 0.05 72); border: 1px solid oklch(74% 0.14 74 / 0.55); border-radius: 8px; padding: 24px 44px; display: flex; align-items: center; justify-content: space-between;\">\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); font-weight: 300;\">Module<\u002Fspan>\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim);\">user model, cart<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"width: 2px; height: 18px; background: oklch(74% 0.14 74 / 0.75);\"><\u002Fdiv>\n        <div style=\"width: 400px; background: oklch(22% 0.07 72); border: 2px solid var(--gold); border-radius: 8px; padding: 24px 44px; display: flex; align-items: center; justify-content: center;\">\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--gold); font-weight: 400;\">Function<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 10: KEY TAKEAWAYS -->\n  <section data-label=\"Key Takeaways\" data-screen-label=\"10 — Key Takeaways\" data-speaker-notes=\"To close: holons give us a lens to understand nested complexity in any domain. The key shift is from either/or thinking — whole OR part — to both/and. Every thing is always both. That shift changes how you see organizations, software, nature, and your own place within larger systems.\">\n    <div style=\"background: var(--bg-warm); width: 100%; height: 100%; display: flex; flex-direction: column; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: var(--gap-lg);\">\n      <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Key Ideas<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0;\">What to take away<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; flex-direction: column; gap: var(--gap-md); justify-content: center;\">\n        <div style=\"display: flex; align-items: flex-start; gap: 36px;\">\n          <span style=\"font-family: 'Cormorant Garamond', serif; font-size: 72px; color: var(--gold); font-weight: 300; line-height: 1; flex: 0 0 60px;\">1<\u002Fspan>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.5; text-wrap: pretty;\"><strong style=\"font-weight: 500;\">Wholeness and partness are always relative,<\u002Fstrong> never absolute. Every entity exists at a scale.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"height: 1px; background: oklch(74% 0.14 74 / 0.15); margin-left: 96px;\"><\u002Fdiv>\n        <div style=\"display: flex; align-items: flex-start; gap: 36px;\">\n          <span style=\"font-family: 'Cormorant Garamond', serif; font-size: 72px; color: var(--gold); font-weight: 300; line-height: 1; flex: 0 0 60px;\">2<\u002Fspan>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.5; text-wrap: pretty;\"><strong style=\"font-weight: 500;\">New properties emerge at each level<\u002Fstrong> of a holarchy — properties that cannot be found in the parts below.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"height: 1px; background: oklch(74% 0.14 74 / 0.15); margin-left: 96px;\"><\u002Fdiv>\n        <div style=\"display: flex; align-items: flex-start; gap: 36px;\">\n          <span style=\"font-family: 'Cormorant Garamond', serif; font-size: 72px; color: var(--gold); font-weight: 300; line-height: 1; flex: 0 0 60px;\">3<\u002Fspan>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.5; text-wrap: pretty;\"><strong style=\"font-weight: 500;\">Healthy systems balance autonomy and integration<\u002Fstrong> — the two tendencies must coexist in every holon.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"height: 1px; background: oklch(74% 0.14 74 / 0.15); margin-left: 96px;\"><\u002Fdiv>\n        <div style=\"display: flex; align-items: flex-start; gap: 36px;\">\n          <span style=\"font-family: 'Cormorant Garamond', serif; font-size: 72px; color: var(--gold); font-weight: 300; line-height: 1; flex: 0 0 60px;\">4<\u002Fspan>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.5; text-wrap: pretty;\"><strong style=\"font-weight: 500;\">This pattern appears across every domain<\u002Fstrong> — nature, organizations, and technology all follow holonic structure.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE WHY: WHY NOW -->\n  <section data-label=\"Why Holons, Why Now\" data-screen-label=\"11 — Why Holons, Why Now\" data-speaker-notes=\"The question isn't only what holons are — it's why the time for a structured community effort is now. Three forces are converging: existing knowledge graph architectures hit limits in complex stateful domains; the AI integration moment demands grounded, scoped context; and the maturation of RDF 1.2, SHACL, and MCP provides the tooling. This is not a moment for a single vendor implementation — it's a moment for shared conventions.\">\n    <div style=\"background: var(--bg2); width: 100%; height: 100%; display: flex; flex-direction: column; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: var(--gap-lg);\">\n      <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Founding Argument<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0;\">Why holons, why now<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; gap: 36px; align-items: stretch;\">\n        <div style=\"flex: 1; background: oklch(16% 0.05 72); border-radius: 8px; padding: 44px; display: flex; flex-direction: column; gap: 20px;\">\n          <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 44px; font-style: italic; font-weight: 300; color: var(--fg); margin: 0; line-height: 1.2;\">Flat graphs aren't enough<\u002Fp>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.65; text-wrap: pretty;\">Existing knowledge graph architectures are powerful but flat — they lack native support for scope, temporality, and nested narrative context. Complex stateful domains need something more structured.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"flex: 1; background: oklch(16% 0.05 195); border-radius: 8px; padding: 44px; display: flex; flex-direction: column; gap: 20px;\">\n          <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 44px; font-style: italic; font-weight: 300; color: var(--fg); margin: 0; line-height: 1.2;\">The AI integration moment<\u002Fp>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.65; text-wrap: pretty;\">LLMs need grounded, scoped context to reason reliably. The convergence of RDF 1.2, SHACL, and MCP now provides the tooling to supply it. Demand for structured, bounded context has never been higher.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"flex: 1; background: oklch(16% 0.05 72); border-radius: 8px; padding: 44px; display: flex; flex-direction: column; gap: 20px;\">\n          <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 44px; font-style: italic; font-weight: 300; color: var(--fg); margin: 0; line-height: 1.2;\">Community over vendor<\u002Fp>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.65; text-wrap: pretty;\">This is not a moment for a single implementation. Shared conventions — for messaging, architecture, and interoperability — require a community effort rather than a proprietary standard.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 11: LATERAL CONNECTIONS -->\n  <section data-label=\"Lateral Connections\" data-screen-label=\"12 — Lateral Connections\" data-speaker-notes=\"Beyond nesting, holons can also connect laterally — through what we might call interconnected doorways. A room is a holon; hallways connect it to other rooms. A city is a holon; routes connect it to other cities. A concept is a holon; relationships connect it to other concepts. These lateral connections let us navigate between different domains of concern while still bearing a relationship to the original holon.\">\n    <div style=\"background: var(--bg); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 540px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Connections<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">Beyond containment<\u002Fh2>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.6; opacity: 0.85; text-wrap: pretty;\">Holons can also connect <span style=\"color: var(--gold);\">laterally<\u002Fspan> — through interconnected doorways at the same level.<\u002Fp>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.7; text-wrap: pretty;\">Such connections help focus on differing domains of concern, while still bearing a relationship to the original holon.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 60px;\">\n        <!-- Row 1: Rooms & hallways -->\n        <div style=\"display: flex; align-items: center; justify-content: center;\">\n          <div style=\"width: 80px; height: 80px; border-radius: 50%; border: 1.5px solid oklch(74% 0.14 74 / 0.3); display: flex; align-items: center; justify-content: center; flex: none;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.5);\">Room<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"width: 200px; height: 1.5px; background: oklch(74% 0.14 74 / 0.28); position: relative; flex: none;\">\n            <span style=\"position: absolute; top: -28px; left: 0; width: 100%; text-align: center; font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.45); font-style: italic; white-space: nowrap;\">hallway<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"width: 96px; height: 96px; border-radius: 50%; border: 2px solid var(--gold); background: oklch(22% 0.07 72); display: flex; align-items: center; justify-content: center; flex: none;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--gold); font-weight: 500;\">Room<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"width: 200px; height: 1.5px; background: oklch(74% 0.14 74 / 0.28); position: relative; flex: none;\">\n            <span style=\"position: absolute; top: -28px; left: 0; width: 100%; text-align: center; font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.45); font-style: italic; white-space: nowrap;\">hallway<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"width: 80px; height: 80px; border-radius: 50%; border: 1.5px solid oklch(74% 0.14 74 / 0.3); display: flex; align-items: center; justify-content: center; flex: none;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.5);\">Room<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Row 2: Related concepts -->\n        <div style=\"display: flex; align-items: center; justify-content: center;\">\n          <div style=\"width: 80px; height: 80px; border-radius: 50%; border: 1.5px solid oklch(74% 0.14 74 / 0.3); display: flex; align-items: center; justify-content: center; flex: none;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.5);\">Idea<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"width: 200px; height: 1.5px; background: oklch(74% 0.14 74 / 0.28); position: relative; flex: none;\">\n            <span style=\"position: absolute; top: -28px; left: 0; width: 100%; text-align: center; font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.45); font-style: italic; white-space: nowrap;\">relation<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"width: 96px; height: 96px; border-radius: 50%; border: 2px solid var(--gold); background: oklch(22% 0.07 72); display: flex; align-items: center; justify-content: center; flex: none;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--gold); font-weight: 500;\">Idea<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"width: 200px; height: 1.5px; background: oklch(74% 0.14 74 / 0.28); position: relative; flex: none;\">\n            <span style=\"position: absolute; top: -28px; left: 0; width: 100%; text-align: center; font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.45); font-style: italic; white-space: nowrap;\">relation<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"width: 80px; height: 80px; border-radius: 50%; border: 1.5px solid oklch(74% 0.14 74 / 0.3); display: flex; align-items: center; justify-content: center; flex: none;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.5);\">Idea<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Row 3: Cities & routes -->\n        <div style=\"display: flex; align-items: center; justify-content: center;\">\n          <div style=\"width: 80px; height: 80px; border-radius: 50%; border: 1.5px solid oklch(74% 0.14 74 / 0.3); display: flex; align-items: center; justify-content: center; flex: none;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.5);\">City<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"width: 200px; height: 1.5px; background: oklch(74% 0.14 74 / 0.28); position: relative; flex: none;\">\n            <span style=\"position: absolute; top: -28px; left: 0; width: 100%; text-align: center; font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.45); font-style: italic; white-space: nowrap;\">route<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"width: 96px; height: 96px; border-radius: 50%; border: 2px solid var(--gold); background: oklch(22% 0.07 72); display: flex; align-items: center; justify-content: center; flex: none;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--gold); font-weight: 500;\">City<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"width: 200px; height: 1.5px; background: oklch(74% 0.14 74 / 0.28); position: relative; flex: none;\">\n            <span style=\"position: absolute; top: -28px; left: 0; width: 100%; text-align: center; font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.45); font-style: italic; white-space: nowrap;\">route<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"width: 80px; height: 80px; border-radius: 50%; border: 1.5px solid oklch(74% 0.14 74 / 0.3); display: flex; align-items: center; justify-content: center; flex: none;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.5);\">City<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 12: HOLONS AS NAMED GRAPHS -->\n  <section data-label=\"Holons as Named Graphs\" data-screen-label=\"13 — Holons as Named Graphs\" data-speaker-notes=\"Beyond nesting and lateral connections, holons also form graphs. These graphs are self-contained — they have a clear boundary defining membership, which is why we call them named graphs. Crucially they are temporal: they don't just capture a snapshot of structure; they record a history of events — changes to the state of items within the graph over time.\">\n    <div style=\"background: var(--bg2); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 540px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Graph Theory<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">Holons as named graphs<\u002Fh2>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.6; opacity: 0.85; text-wrap: pretty;\">Holons naturally form graphs — but these graphs are <span style=\"color: var(--gold);\">self-contained<\u002Fspan> and <span style=\"color: var(--gold);\">temporal<\u002Fspan>.<\u002Fp>\n        <div style=\"display: flex; flex-direction: column; gap: 20px;\">\n          <div style=\"display: flex; gap: 20px; align-items: flex-start;\">\n            <div style=\"width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex: none; margin-top: 11px;\"><\u002Fdiv>\n            <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.6; text-wrap: pretty;\"><strong style=\"color: var(--fg); font-weight: 500;\">Self-contained (named):<\u002Fstrong> a clear boundary defines what belongs to the holon.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display: flex; gap: 20px; align-items: flex-start;\">\n            <div style=\"width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex: none; margin-top: 11px;\"><\u002Fdiv>\n            <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.6; text-wrap: pretty;\"><strong style=\"color: var(--fg); font-weight: 500;\">Temporal:<\u002Fstrong> events record changes to the state of items over time.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.65; font-style: italic; text-wrap: pretty;\">“Named” here is a conceptual term — the holon graph model is format-agnostic and does not require the RDF stack.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; align-items: center; justify-content: center;\">\n        <div style=\"position: relative; width: 560px; height: 460px; border: 1.5px solid oklch(74% 0.14 74 / 0.28); border-radius: 12px; background: oklch(11% 0.04 72);\">\n          <span style=\"position: absolute; top: 14px; left: 50%; transform: translateX(-50%); font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.4); letter-spacing: 0.12em; text-transform: uppercase; white-space: nowrap;\">Named Graph<\u002Fspan>\n          <!-- Edges -->\n          <div style=\"position: absolute; top: 135px; left: 162px; width: 236px; height: 1.5px; background: oklch(74% 0.14 74 / 0.2);\"><\u002Fdiv>\n          <div style=\"position: absolute; top: 335px; left: 162px; width: 236px; height: 1.5px; background: oklch(74% 0.14 74 / 0.2);\"><\u002Fdiv>\n          <div style=\"position: absolute; top: 164px; left: 133px; width: 1.5px; height: 144px; background: oklch(74% 0.14 74 / 0.2);\"><\u002Fdiv>\n          <div style=\"position: absolute; top: 164px; left: 425px; width: 1.5px; height: 144px; background: oklch(74% 0.14 74 / 0.2);\"><\u002Fdiv>\n          <!-- Node n₁ top-left -->\n          <div style=\"position: absolute; top: 108px; left: 106px; width: 56px; height: 56px; border-radius: 50%; border: 1.5px solid oklch(74% 0.14 74 / 0.4); background: oklch(16% 0.05 72); display: flex; align-items: center; justify-content: center;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.65);\">n₁<\u002Fspan>\n          <\u002Fdiv>\n          <!-- Node n₂ top-right -->\n          <div style=\"position: absolute; top: 108px; left: 398px; width: 56px; height: 56px; border-radius: 50%; border: 1.5px solid oklch(74% 0.14 74 / 0.4); background: oklch(16% 0.05 72); display: flex; align-items: center; justify-content: center;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.65);\">n₂<\u002Fspan>\n          <\u002Fdiv>\n          <!-- Node n₃ bottom-left -->\n          <div style=\"position: absolute; top: 308px; left: 106px; width: 56px; height: 56px; border-radius: 50%; border: 1.5px solid oklch(74% 0.14 74 / 0.4); background: oklch(16% 0.05 72); display: flex; align-items: center; justify-content: center;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.65);\">n₃<\u002Fspan>\n          <\u002Fdiv>\n          <!-- Node n₄ bottom-right -->\n          <div style=\"position: absolute; top: 308px; left: 398px; width: 56px; height: 56px; border-radius: 50%; border: 1.5px solid oklch(74% 0.14 74 / 0.4); background: oklch(16% 0.05 72); display: flex; align-items: center; justify-content: center;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.65);\">n₄<\u002Fspan>\n          <\u002Fdiv>\n          <!-- Event timeline at bottom of container -->\n          <div style=\"position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 10px;\">\n            <div style=\"width: 10px; height: 10px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.5);\"><\u002Fdiv>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.35);\">e₁<\u002Fspan>\n            <div style=\"width: 36px; height: 1px; background: oklch(74% 0.14 74 / 0.25);\"><\u002Fdiv>\n            <div style=\"width: 10px; height: 10px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.5);\"><\u002Fdiv>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.35);\">e₂<\u002Fspan>\n            <div style=\"width: 36px; height: 1px; background: oklch(74% 0.14 74 / 0.25);\"><\u002Fdiv>\n            <div style=\"width: 10px; height: 10px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.5);\"><\u002Fdiv>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.35);\">e₃<\u002Fspan>\n            <div style=\"width: 36px; height: 1px; background: oklch(74% 0.14 74 / 0.25);\"><\u002Fdiv>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.35);\">→ time<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 13: AGENTS & TRAJECTORIES -->\n  <section data-label=\"Agents &amp; Trajectories\" data-screen-label=\"14 — Agents &amp; Trajectories\" data-speaker-notes=\"Within a holon's graph, the items that change are called agents. An agent is an observable — something you can watch and measure within the holon. Each time an agent changes state, that is an event. The complete sequence of events for a given agent is its trajectory within the holon — the path it traces through state space over time.\">\n    <div style=\"background: var(--bg); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 540px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Dynamics<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">Agents &amp; trajectories<\u002Fh2>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.6; opacity: 0.85; text-wrap: pretty;\">Items that change within a graph are called <span style=\"color: var(--gold);\">agents<\u002Fspan> — the observables within the holon.<\u002Fp>\n        <div style=\"display: flex; flex-direction: column; gap: 20px;\">\n          <div style=\"display: flex; gap: 20px; align-items: flex-start;\">\n            <div style=\"width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex: none; margin-top: 11px;\"><\u002Fdiv>\n            <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.6; text-wrap: pretty;\"><strong style=\"color: var(--fg); font-weight: 500;\">Agent:<\u002Fstrong> a node within the graph whose state changes over time.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display: flex; gap: 20px; align-items: flex-start;\">\n            <div style=\"width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex: none; margin-top: 11px;\"><\u002Fdiv>\n            <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.6; text-wrap: pretty;\"><strong style=\"color: var(--fg); font-weight: 500;\">Trajectory:<\u002Fstrong> the ordered set of events for a given agent — its path through the holon.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; align-items: center; justify-content: center;\">\n        <div style=\"width: 700px; display: flex; flex-direction: column; gap: 48px;\">\n          <!-- Mini-graph: 3 nodes, middle = agent -->\n          <div style=\"position: relative; height: 120px;\">\n            <div style=\"position: absolute; top: 49px; left: 118px; width: 192px; height: 1.5px; background: oklch(74% 0.14 74 / 0.25);\"><\u002Fdiv>\n            <div style=\"position: absolute; top: 49px; left: 390px; width: 192px; height: 1.5px; background: oklch(74% 0.14 74 / 0.25);\"><\u002Fdiv>\n            <!-- n₁ left -->\n            <div style=\"position: absolute; top: 22px; left: 62px; width: 56px; height: 56px; border-radius: 50%; border: 1.5px solid oklch(74% 0.14 74 / 0.32); display: flex; align-items: center; justify-content: center;\">\n              <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.5);\">n₁<\u002Fspan>\n            <\u002Fdiv>\n            <!-- agent center (highlighted) -->\n            <div style=\"position: absolute; top: 10px; left: 310px; width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--gold); background: oklch(22% 0.07 72); display: flex; align-items: center; justify-content: center;\">\n              <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--gold); font-weight: 500;\">agent<\u002Fspan>\n            <\u002Fdiv>\n            <!-- n₂ right -->\n            <div style=\"position: absolute; top: 22px; left: 582px; width: 56px; height: 56px; border-radius: 50%; border: 1.5px solid oklch(74% 0.14 74 / 0.32); display: flex; align-items: center; justify-content: center;\">\n              <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.5);\">n₂<\u002Fspan>\n            <\u002Fdiv>\n            <span style=\"position: absolute; top: 96px; left: 0; width: 100%; text-align: center; font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); font-style: italic;\">an observable within the graph<\u002Fspan>\n          <\u002Fdiv>\n          <!-- Divider -->\n          <div style=\"height: 1px; background: oklch(74% 0.14 74 / 0.1);\"><\u002Fdiv>\n          <!-- Trajectory timeline -->\n          <div style=\"display: flex; flex-direction: column; gap: 20px;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); letter-spacing: 0.12em; text-transform: uppercase;\">Trajectory<\u002Fspan>\n            <div style=\"position: relative; height: 72px;\">\n              <div style=\"position: absolute; top: 20px; left: 0; width: 640px; height: 1.5px; background: oklch(74% 0.14 74 / 0.28);\"><\u002Fdiv>\n              <span style=\"position: absolute; top: 7px; left: 648px; font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.4);\">→<\u002Fspan>\n              <!-- e₁ -->\n              <div style=\"position: absolute; top: 12px; left: 36px; width: 16px; height: 16px; border-radius: 50%; background: var(--gold);\"><\u002Fdiv>\n              <span style=\"position: absolute; top: 40px; left: 28px; font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.55);\">e₁<\u002Fspan>\n              <!-- e₂ -->\n              <div style=\"position: absolute; top: 12px; left: 196px; width: 16px; height: 16px; border-radius: 50%; background: var(--gold);\"><\u002Fdiv>\n              <span style=\"position: absolute; top: 40px; left: 188px; font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.55);\">e₂<\u002Fspan>\n              <!-- e₃ -->\n              <div style=\"position: absolute; top: 12px; left: 356px; width: 16px; height: 16px; border-radius: 50%; background: var(--gold);\"><\u002Fdiv>\n              <span style=\"position: absolute; top: 40px; left: 348px; font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.55);\">e₃<\u002Fspan>\n              <!-- e₄ -->\n              <div style=\"position: absolute; top: 12px; left: 516px; width: 16px; height: 16px; border-radius: 50%; background: var(--gold);\"><\u002Fdiv>\n              <span style=\"position: absolute; top: 40px; left: 508px; font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.55);\">e₄<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; font-style: italic;\">The set of events for a given agent forms its trajectory within the holon.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 14: SCOPE -->\n  <section data-label=\"Scope\" data-screen-label=\"15 — Scope\" data-speaker-notes=\"Holons introduce a concept analogous to scope in programming languages. A containing holon may declare entities — agents are entities — that its contained holons can reference. A holon can also include another holon to gain access to its declared entities, with restrictions on what can be referenced.\">\n    <div style=\"background: var(--bg2); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 540px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Scope<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">Entities &amp; scope<\u002Fh2>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.6; opacity: 0.85; text-wrap: pretty;\">A containing holon may <span style=\"color: var(--gold);\">declare<\u002Fspan> entities that its contained holons can <span style=\"color: var(--gold);\">reference<\u002Fspan> — the graph equivalent of scope.<\u002Fp>\n        <div style=\"display: flex; flex-direction: column; gap: 20px;\">\n          <div style=\"display: flex; gap: 20px; align-items: flex-start;\">\n            <div style=\"width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex: none; margin-top: 11px;\"><\u002Fdiv>\n            <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.6; text-wrap: pretty;\"><strong style=\"color: var(--fg); font-weight: 500;\">Agents are entities<\u002Fstrong> — items that change state and can be declared and shared across holons.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display: flex; gap: 20px; align-items: flex-start;\">\n            <div style=\"width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex: none; margin-top: 11px;\"><\u002Fdiv>\n            <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.6; text-wrap: pretty;\"><strong style=\"color: var(--fg); font-weight: 500;\">Including a holon<\u002Fstrong> grants access to its declared entities, with restrictions on what can be referenced.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; align-items: center; justify-content: center;\">\n        <div style=\"position: relative; width: 700px; height: 520px; border: 1.5px solid oklch(74% 0.14 74 / 0.25); border-radius: 12px; background: oklch(11% 0.04 72);\">\n          <span style=\"position: absolute; top: 14px; left: 26px; font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.38); letter-spacing: 0.1em; text-transform: uppercase;\">Containing Holon<\u002Fspan>\n          <!-- Entity A declaration -->\n          <div style=\"position: absolute; top: 56px; left: 32px; display: flex; align-items: center; gap: 12px;\">\n            <div style=\"width: 12px; height: 12px; border-radius: 50%; background: var(--gold); flex: none;\"><\u002Fdiv>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--gold); font-weight: 500;\">Entity A<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); font-style: italic;\">declared here<\u002Fspan>\n          <\u002Fdiv>\n          <!-- Dashed vertical connector -->\n          <div style=\"position: absolute; top: 68px; left: 37px; width: 0; height: 78px; border-left: 1.5px dashed oklch(74% 0.14 74 / 0.35);\"><\u002Fdiv>\n          <!-- Contained holon box -->\n          <div style=\"position: absolute; top: 146px; left: 32px; right: 32px; bottom: 32px; border: 1.5px solid oklch(74% 0.14 74 / 0.4); border-radius: 8px; background: oklch(14% 0.05 72); padding: 20px 28px; display: flex; flex-direction: column; gap: 24px;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.55); letter-spacing: 0.1em; text-transform: uppercase;\">Contained Holon<\u002Fspan>\n            <div style=\"display: flex; align-items: center; gap: 12px;\">\n              <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.5);\">→<\u002Fspan>\n              <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--gold); font-weight: 500;\">Entity A<\u002Fspan>\n              <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); font-style: italic;\">referenced<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.65; max-width: 480px; text-wrap: pretty;\">A contained holon sees only what its containing holon has declared — and only what it has been granted permission to reference.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 15: SEMANTIC GRAPHS -->\n  <section data-label=\"Semantic Graphs\" data-screen-label=\"16 — Semantic Graphs\" data-speaker-notes=\"Here's a concrete
