 example. An employee entity is declared within the company holon. Both the HR holon and the R&amp;D holon can reference that same employee — but for completely different purposes. HR sees the employee in terms of benefits and roles; R&amp;D sees them in terms of projects and skills. This shared referencing across contexts is why holons and semantic graphs are such a natural fit.\">\n    <div style=\"background: var(--bg-warm); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 540px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Semantic Graphs<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">One entity, many contexts<\u002Fh2>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.6; opacity: 0.85; text-wrap: pretty;\">An employee declared in a company holon can be referenced by both an HR holon and an R&amp;D holon — for entirely different purposes.<\u002Fp>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.7; text-wrap: pretty;\">This is why holons and <span style=\"color: var(--gold);\">semantic graphs<\u002Fspan> work so well together — both treat entities as meaningful across multiple contexts simultaneously.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; align-items: center; justify-content: center;\">\n        <div style=\"position: relative; width: 760px; height: 480px; border: 1.5px solid oklch(74% 0.14 74 / 0.25); border-radius: 12px; background: oklch(14% 0.05 72);\">\n          <span style=\"position: absolute; top: 14px; left: 26px; font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.38); letter-spacing: 0.1em; text-transform: uppercase;\">Company Holon<\u002Fspan>\n          <!-- Employee entity (declared, centered) -->\n          <div style=\"position: absolute; top: 52px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 12px; white-space: nowrap;\">\n            <div style=\"width: 14px; height: 14px; border-radius: 50%; background: var(--gold); flex: none;\"><\u002Fdiv>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--gold); font-weight: 500;\">Employee<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); font-style: italic;\">declared<\u002Fspan>\n          <\u002Fdiv>\n          <!-- Vertical dashed line down to junction -->\n          <div style=\"position: absolute; top: 86px; left: 379px; width: 0; height: 152px; border-left: 1.5px dashed oklch(74% 0.14 74 / 0.35);\"><\u002Fdiv>\n          <!-- Horizontal junction -->\n          <div style=\"position: absolute; top: 238px; left: 195px; width: 370px; height: 1.5px; background: oklch(74% 0.14 74 / 0.3);\"><\u002Fdiv>\n          <!-- HR Holon -->\n          <div style=\"position: absolute; top: 244px; left: 40px; width: 310px; height: 196px; border: 1.5px solid oklch(74% 0.14 74 / 0.4); border-radius: 8px; background: oklch(16% 0.06 72); padding: 20px 24px; display: flex; flex-direction: column; gap: 14px;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.58); letter-spacing: 0.1em; text-transform: uppercase;\">HR Holon<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--gold);\">→ Employee<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); font-style: italic;\">benefits &amp; roles<\u002Fspan>\n          <\u002Fdiv>\n          <!-- R&D Holon -->\n          <div style=\"position: absolute; top: 244px; left: 410px; width: 310px; height: 196px; border: 1.5px solid oklch(74% 0.14 74 / 0.4); border-radius: 8px; background: oklch(16% 0.06 72); padding: 20px 24px; display: flex; flex-direction: column; gap: 14px;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.58); letter-spacing: 0.1em; text-transform: uppercase;\">R&amp;D Holon<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--gold);\">→ Employee<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); font-style: italic;\">projects &amp; skills<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 16: FOUR ASPECTS -->\n  <section data-label=\"Four Aspects\" data-screen-label=\"17 — Four Aspects\" data-speaker-notes=\"Every holon can be understood through four design partitions. The scene graph holds the internal state. The context or event graph records mutations to agents over time. The boundary defines the rules governing the system's evolution. And projection layers represent the different views available to external observers. These are conceptual partitions rather than formal graph structures.\">\n    <div style=\"background: var(--bg); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 500px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Four Aspects<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">A holon's four aspects<\u002Fh2>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.6; opacity: 0.85; text-wrap: pretty;\">Every holon consists of four distinct design partitions, each serving a different structural purpose.<\u002Fp>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.7; text-wrap: pretty; font-style: italic;\">These aren't necessarily graphs in the formal sense — they are conceptual partitions that define how a holon is structured and observed.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; align-items: center; justify-content: center;\">\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 24px; width: 100%; height: 560px;\">\n          <!-- Card 1: Scene Graph -->\n          <div style=\"background: oklch(18% 0.06 72); border-radius: 8px; padding: 32px 36px; position: relative; display: flex; flex-direction: column; gap: 16px; overflow: hidden;\">\n            <span style=\"position: absolute; top: 10px; right: 20px; font-family: 'Cormorant Garamond', serif; font-size: 80px; font-weight: 300; color: oklch(74% 0.14 74 / 0.14); line-height: 1;\">1<\u002Fspan>\n            <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 44px; font-style: italic; font-weight: 300; color: var(--fg); margin: 0; line-height: 1.15;\">Scene Graph<\u002Fp>\n            <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.55; text-wrap: pretty;\">Represents the internal state — components, relationships, and current configuration of the holon.<\u002Fp>\n          <\u002Fdiv>\n          <!-- Card 2: Event Graph -->\n          <div style=\"background: oklch(16% 0.05 195); border-radius: 8px; padding: 32px 36px; position: relative; display: flex; flex-direction: column; gap: 16px; overflow: hidden;\">\n            <span style=\"position: absolute; top: 10px; right: 20px; font-family: 'Cormorant Garamond', serif; font-size: 80px; font-weight: 300; color: oklch(65% 0.10 195 / 0.18); line-height: 1;\">2<\u002Fspan>\n            <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 44px; font-style: italic; font-weight: 300; color: var(--fg); margin: 0; line-height: 1.15;\">Event Graph<\u002Fp>\n            <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.55; text-wrap: pretty;\">Records mutations to the agents — the history of how the system has changed over time.<\u002Fp>\n          <\u002Fdiv>\n          <!-- Card 3: Boundary -->\n          <div style=\"background: oklch(18% 0.06 72); border-radius: 8px; padding: 32px 36px; position: relative; display: flex; flex-direction: column; gap: 16px; overflow: hidden;\">\n            <span style=\"position: absolute; top: 10px; right: 20px; font-family: 'Cormorant Garamond', serif; font-size: 80px; font-weight: 300; color: oklch(74% 0.14 74 / 0.14); line-height: 1;\">3<\u002Fspan>\n            <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 44px; font-style: italic; font-weight: 300; color: var(--fg); margin: 0; line-height: 1.15;\">Boundary<\u002Fp>\n            <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.55; text-wrap: pretty;\">Rules and restrictions governing the system's evolution — what may change and how.<\u002Fp>\n          <\u002Fdiv>\n          <!-- Card 4: Projection Layers -->\n          <div style=\"background: oklch(16% 0.05 195); border-radius: 8px; padding: 32px 36px; position: relative; display: flex; flex-direction: column; gap: 16px; overflow: hidden;\">\n            <span style=\"position: absolute; top: 10px; right: 20px; font-family: 'Cormorant Garamond', serif; font-size: 80px; font-weight: 300; color: oklch(65% 0.10 195 / 0.18); line-height: 1;\">4<\u002Fspan>\n            <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 44px; font-style: italic; font-weight: 300; color: var(--fg); margin: 0; line-height: 1.15;\">Projection Layers<\u002Fp>\n            <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.55; text-wrap: pretty;\">Multiple views of the holon, each representing a different observer's perspective on the same system.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 17: THE SCENE GRAPH -->\n  <section data-label=\"The Scene Graph\" data-screen-label=\"18 — The Scene Graph\" data-speaker-notes=\"The Scene Graph is the knowledge graph for the holon — the stage on which everything is set. It contains the agents (characters), props, scenery, portals, and so on that participate in the holon. It may also record originating states for entities — the baseline from which changes are measured.\">\n    <div style=\"background: var(--bg-warm); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 540px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Aspect 1<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">The Scene Graph<\u002Fh2>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.6; opacity: 0.85; text-wrap: pretty;\">The Scene is the <span style=\"color: var(--gold);\">knowledge graph<\u002Fspan> for the holon — the stage on which the narrative is enacted.<\u002Fp>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.7; text-wrap: pretty;\">It contains all participating entities and may also record their originating states — the baseline from which changes are measured.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; align-items: center; justify-content: center;\">\n        <div style=\"width: 600px; border: 1.5px solid oklch(74% 0.14 74 / 0.28); border-radius: 10px; background: oklch(14% 0.05 72); overflow: hidden;\">\n          <div style=\"padding: 16px 28px; border-bottom: 1px solid oklch(74% 0.14 74 / 0.12);\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.45); letter-spacing: 0.1em; text-transform: uppercase;\">Scene Graph<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 20px; padding: 18px 28px; border-bottom: 1px solid oklch(74% 0.14 74 / 0.08);\">\n            <div style=\"width: 24px; height: 24px; border-radius: 50%; background: var(--gold); flex: none;\"><\u002Fdiv>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg); flex: 1;\">Agent A<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); font-style: italic;\">character<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 20px; padding: 18px 28px; border-bottom: 1px solid oklch(74% 0.14 74 / 0.08);\">\n            <div style=\"width: 24px; height: 24px; border-radius: 50%; background: var(--gold); opacity: 0.65; flex: none;\"><\u002Fdiv>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg); flex: 1;\">Agent B<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); font-style: italic;\">character<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 20px; padding: 18px 28px; border-bottom: 1px solid oklch(74% 0.14 74 / 0.08);\">\n            <div style=\"width: 22px; height: 22px; border: 1.5px solid var(--gold); border-radius: 3px; flex: none;\"><\u002Fdiv>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg); flex: 1;\">Key<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); font-style: italic;\">prop<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 20px; padding: 18px 28px; border-bottom: 1px solid oklch(74% 0.14 74 / 0.08);\">\n            <div style=\"width: 24px; height: 24px; border-radius: 50%; border: 1.5px dashed var(--gold); flex: none;\"><\u002Fdiv>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg); flex: 1;\">Door<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); font-style: italic;\">portal<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 20px; padding: 18px 28px;\">\n            <div style=\"width: 44px; height: 16px; border: 1.5px solid oklch(74% 0.14 74 / 0.45); border-radius: 2px; flex: none;\"><\u002Fdiv>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg); flex: 1;\">Castle<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); font-style: italic;\">scenery<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding: 16px 28px; border-top: 1px solid oklch(74% 0.14 74 / 0.12);\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); font-style: italic;\">The stage on which the narrative is enacted<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE: THREE KINDS OF ENTITY -->\n  <section data-label=\"Three Kinds of Entity\" data-screen-label=\"19 — Three Kinds of Entity\" data-speaker-notes=\"Within a scene, an agent is an entity whose state changes are worth tracking. Every agent is an entity, and every entity can itself be a holon — scale is always relative. The scene graph distinguishes three kinds of entity: agents, which the holon tracks over time and which have trajectories; props, which participate in events but have no trajectory of their own; and scenery, environmental context the holon assumes without tracking. The same entity can be an agent in one holon and a prop in another — agenthood is a scoping decision, not an intrinsic property.\">\n    <div style=\"background: var(--bg); width: 100%; height: 100%; display: flex; flex-direction: column; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: var(--gap-lg);\">\n      <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Scene Graph · Entities<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">Three kinds of entity<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; gap: 32px; align-items: stretch;\">\n        <div style=\"flex: 1; background: oklch(22% 0.07 72); border-radius: 8px; padding: 44px; display: flex; flex-direction: column; gap: 18px; border-top: 3px solid var(--gold);\">\n          <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 48px; font-style: italic; font-weight: 300; color: var(--fg); margin: 0;\">Agents<\u002Fp>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.6; text-wrap: pretty;\">Entities whose state the holon <span style=\"color: var(--gold);\">tracks over time<\u002Fspan>. Each state change produces an event; the ordered sequence is the agent's trajectory.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"flex: 1; background: oklch(18% 0.05 195); border-radius: 8px; padding: 44px; display: flex; flex-direction: column; gap: 18px; border-top: 3px solid var(--teal);\">\n          <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 48px; font-style: italic; font-weight: 300; color: var(--fg); margin: 0;\">Props<\u002Fp>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.6; text-wrap: pretty;\">Entities the holon references but does <span style=\"color: var(--teal);\">not track<\u002Fspan> independently. A prop participates in events — acquired, used, transferred — but has no trajectory.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"flex: 1; background: oklch(22% 0.07 72); border-radius: 8px; padding: 44px; display: flex; flex-direction: column; gap: 18px; border-top: 3px solid var(--gold);\">\n          <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 48px; font-style: italic; font-weight: 300; color: var(--fg); margin: 0;\">Scenery<\u002Fp>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.6; text-wrap: pretty;\">Environmental <span style=\"color: var(--gold);\">context<\u002Fspan> the holon assumes without tracking. A room is scenery; a door may be a prop or agent if its state matters.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); margin: 0; text-align: center; font-style: italic; text-wrap: pretty;\">The same entity can be an agent in one holon and a prop in another — agenthood is a scoping decision, not an intrinsic property.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE: HOLON AGENTS vs AI AGENTS -->\n  <section data-label=\"Holon Agents vs AI Agents\" data-screen-label=\"20 — Holon Agents vs AI Agents\" data-speaker-notes=\"The word agent means different things in different communities. In current AI usage, an agent implies autonomy and goal-directedness. In holon usage, an agent is any entity with a trackable identity and state — people, organisations, documents, devices, physical objects, not only autonomous systems. Where the two coincide — an AI system operating as a tracked entity within a holon — the holon architecture provides exactly what the AI agent needs: a scene, an event log, a boundary, and cameras.\">\n    <div style=\"background: var(--bg2); width: 100%; height: 100%; display: flex; flex-direction: column; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: var(--gap-lg);\">\n      <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Terminology<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">Two meanings of \"agent\"<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; gap: 3px; align-items: stretch;\">\n        <div style=\"flex: 1; background: oklch(16% 0.05 195); border-radius: 8px 0 0 8px; padding: 52px; display: flex; flex-direction: column; gap: 22px;\">\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); font-weight: 500; color: var(--teal); letter-spacing: 0.1em; text-transform: uppercase;\">AI Agent<\u002Fspan>\n          <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 300; color: var(--fg); margin: 0; line-height: 1.2; font-style: italic;\">Implies autonomy and goal-directedness<\u002Fp>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.6; text-wrap: pretty;\">A system that perceives, decides, and acts toward objectives — the prevailing meaning in current AI usage.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"width: 3px; background: var(--gold); opacity: 0.55; flex: none;\"><\u002Fdiv>\n        <div style=\"flex: 1; background: oklch(22% 0.07 72); border-radius: 0 8px 8px 0; padding: 52px; display: flex; flex-direction: column; gap: 22px;\">\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); font-weight: 500; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase;\">Holon Agent<\u002Fspan>\n          <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 300; color: var(--fg); margin: 0; line-height: 1.2; font-style: italic;\">Any entity with trackable identity and state<\u002Fp>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.6; text-wrap: pretty;\">People, organisations, documents, devices, physical objects — not only autonomous systems.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; text-align: center; opacity: 0.85; text-wrap: pretty; line-height: 1.5;\">Where the two coincide, a holon gives an AI agent exactly what it needs — <span style=\"color: var(--gold);\">a scene, an event log, a boundary, and cameras.<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 18: THE EVENT GRAPH -->\n  <section data-label=\"The Event Graph\" data-screen-label=\"21 — The Event Graph\" data-speaker-notes=\"The Event Graph records changes — what agents say or do, mutations of agent state, invalidation events, clock events, and more. In a stage play this is the action log of the scene over time. It is also known as the context graph. Together with the Scene Graph, it gives a full picture of the holon's history.\">\n    <div style=\"background: var(--bg-cool); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 540px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--teal);\">Aspect 2<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">The Event Graph<\u002Fh2>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.6; opacity: 0.85; text-wrap: pretty;\">Event graphs represent <span style=\"color: var(--teal);\">changes<\u002Fspan> — what agents say or do, mutations of state, invalidations, and clock events.<\u002Fp>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.7; text-wrap: pretty;\">In a stage play, this is the action log of the scene over time. Also known as the <span style=\"color: var(--teal);\">context graph<\u002Fspan>.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; align-items: center; justify-content: center;\">\n        <div style=\"position: relative; width: 580px; padding: 16px 0 0 0;\">\n          <div style=\"position: absolute; left: 16px; top: 24px; bottom: 0; width: 1.5px; background: oklch(65% 0.10 195 / 0.2);\"><\u002Fdiv>\n          <div style=\"display: flex; align-items: flex-start; gap: 28px; padding: 0 0 44px 0;\">\n            <div style=\"flex: none; width: 32px; display: flex; justify-content: center; padding-top: 4px;\">\n              <div style=\"width: 16px; height: 16px; border-radius: 50%; background: var(--gold);\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n              <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--gold); font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;\">act<\u002Fspan>\n              <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.5;\">An agent speaks, moves, or performs an action within the scene.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: flex-start; gap: 28px; padding: 0 0 44px 0;\">\n            <div style=\"flex: none; width: 32px; display: flex; justify-content: center; padding-top: 4px;\">\n              <div style=\"width: 16px; height: 16px; border-radius: 50%; background: var(--gold);\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n              <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--gold); font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;\">mutate<\u002Fspan>\n              <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.5;\">An agent's state is updated — properties, attributes, or relationships change.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: flex-start; gap: 28px; padding: 0 0 44px 0;\">\n            <div style=\"flex: none; width: 32px; display: flex; justify-content: center; padding-top: 4px;\">\n              <div style=\"width: 16px; height: 16px; border-radius: 50%; background: var(--teal);\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n              <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--teal); font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;\">invalidate<\u002Fspan>\n              <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.5;\">A resource or state is retired — no longer available for use.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: flex-start; gap: 28px;\">\n            <div style=\"flex: none; width: 32px; display: flex; justify-content: center; padding-top: 4px;\">\n              <div style=\"width: 16px; height: 16px; border-radius: 50%; background: var(--teal);\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n              <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--teal); font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;\">clock<\u002Fspan>\n              <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.5;\">System time advances — triggering scheduled or time-dependent events.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 19: THE BOUNDARY -->\n  <section data-label=\"The Boundary\" data-screen-label=\"22 — The Boundary\" data-speaker-notes=\"The Boundary represents constraints and performs mutations. A character can walk through a door but not a wall. A key is required to unlock that door. A resource, once used, may not be usable again. In RDF 1.2, these constraints are implemented via SHACL shapes and rules — a formal language for expressing what is and isn't permitted within a graph.\">\n    <div style=\"background: var(--bg2); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 540px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Aspect 3<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">The Boundary<\u002Fh2>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.6; opacity: 0.85; text-wrap: pretty;\">The Boundary represents <span style=\"color: var(--gold);\">constraints<\u002Fspan> and performs mutations — governing what may change and how.<\u002Fp>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.7; text-wrap: pretty;\">In RDF 1.2, this is implemented via <span style=\"color: var(--gold);\">SHACL shapes and rules<\u002Fspan> — a formal language for expressing permitted and constrained changes.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; align-items: center; justify-content: center;\">\n        <div style=\"width: 620px; border: 1.5px solid oklch(74% 0.14 74 / 0.25); border-radius: 10px; background: oklch(11% 0.04 72); overflow: hidden;\">\n          <div style=\"padding: 16px 28px; border-bottom: 1px solid oklch(74% 0.14 74 / 0.12);\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.45); letter-spacing: 0.1em; text-transform: uppercase;\">Boundary<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding: 20px 28px; display: flex; flex-direction: column; gap: 16px; border-bottom: 1px solid oklch(74% 0.14 74 / 0.1);\">\n            <div style=\"display: flex; align-items: flex-start; gap: 16px;\">\n              <div style=\"width: 10px; height: 10px; border-radius: 50%; background: oklch(67% 0.11 155); flex: none; margin-top: 9px;\"><\u002Fdiv>\n              <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg); margin: 0; line-height: 1.5;\">Character can walk through a door<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"display: flex; align-items: flex-start; gap: 16px;\">\n              <div style=\"width: 10px; height: 10px; border-radius: 50%; background: var(--gold); flex: none; margin-top: 9px;\"><\u002Fdiv>\n              <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg); margin: 0; line-height: 1.5;\">Key is required to unlock the door <span style=\"color: var(--fg-dim); font-style: italic;\">(conditional)<\u002Fspan><\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding: 20px 28px; display: flex; flex-direction: column; gap: 16px; border-bottom: 1px solid oklch(74% 0.14 74 / 0.1);\">\n            <div style=\"display: flex; align-items: flex-start; gap: 16px;\">\n              <div style=\"width: 10px; height: 10px; border-radius: 50%; background: oklch(65% 0.13 18); flex: none; margin-top: 9px;\"><\u002Fdiv>\n              <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg); margin: 0; line-height: 1.5;\">Character cannot walk through a wall<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"display: flex; align-items: flex-start; gap: 16px;\">\n              <div style=\"width: 10px; height: 10px; border-radius: 50%; background: oklch(65% 0.13 18); flex: none; margin-top: 9px;\"><\u002Fdiv>\n              <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg); margin: 0; line-height: 1.5;\">A resource, once used, may not be usable again<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding: 16px 28px;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); font-style: italic;\">RDF 1.2 — SHACL shapes and rules<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 20: THE PROJECTION LAYER -->\n  <section data-label=\"The Projection Layer\" data-screen-label=\"23 — The Projection Layer\" data-speaker-notes=\"The Projection Layer is how the holon is seen from outside. It may be a view from the audience, a map of characters from above, the perspective of the scene from a given agent, and so on. Projections are frequently mediated by cameras within the scene — a camera being any means of performing observations. There will usually be multiple projections for any given holon.\">\n    <div style=\"background: var(--bg); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 540px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Aspect 4<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">The Projection Layer<\u002Fh2>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.6; opacity: 0.85; text-wrap: pretty;\">How the holon is seen from <span style=\"color: var(--gold);\">outside<\u002Fspan> — mediated by cameras within the scene.<\u002Fp>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.7; text-wrap: pretty;\">A <span style=\"color: var(--gold);\">camera<\u002Fspan> is a designated observation point within the scene — a defined perspective or query that selects and filters what is visible from a given vantage. There will usually be <span style=\"color: var(--gold);\">multiple projections<\u002Fspan> for any holon, each mediated by a different camera — each giving a different view of the same system.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px;\">\n        <div style=\"display: flex; gap: 24px; align-items: flex-start; width: 100%;\">\n          <!-- Frame 1: Audience -->\n          <div style=\"flex: 1; display: flex; flex-direction: column; gap: 14px;\">\n            <div style=\"height: 240px; border: 1.5px solid oklch(74% 0.14 74 / 0.3); border-radius: 6px; background: oklch(11% 0.04 72); position: relative; overflow: hidden;\">\n              <div style=\"position: absolute; bottom: 32%; left: 12%; right: 12%; height: 1.5px; background: oklch(74% 0.14 74 / 0.4);\"><\u002Fdiv>\n              <div style=\"position: absolute; bottom: 32%; left: 34%; width: 14px; height: 14px; border-radius: 50%; background: var(--gold); transform: translateY(-50%);\"><\u002Fdiv>\n              <div style=\"position: absolute; bottom: 32%; left: 54%; width: 12px; height: 12px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.55); transform: translateY(-50%);\"><\u002Fdiv>\n              <div style=\"position: absolute; top: 0; bottom: 0; left: 0; width: 12%; background: oklch(74% 0.14 74 / 0.05);\"><\u002Fdiv>\n              <div style=\"position: absolute; top: 0; bottom: 0; right: 0; width: 12%; background: oklch(74% 0.14 74 / 0.05);\"><\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg); font-weight: 500;\">Audience<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim);\">Front-facing scene view<\u002Fspan>\n          <\u002Fdiv>\n          <!-- Frame 2: Aerial Map -->\n          <div style=\"flex: 1; display: flex; flex-direction: column; gap: 14px;\">\n            <div style=\"height: 240px; border: 1.5px solid oklch(74% 0.14 74 / 0.3); border-radius: 6px; background: oklch(11% 0.04 72); display: flex; align-items: center; justify-content: center;\">\n              <div style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; padding: 16px;\">\n                <div style=\"width: 8px; height: 8px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.25);\"><\u002Fdiv>\n                <div style=\"width: 10px; height: 10px; border-radius: 50%; background: var(--gold);\"><\u002Fdiv>\n                <div style=\"width: 8px; height: 8px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.25);\"><\u002Fdiv>\n                <div style=\"width: 8px; height: 8px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.25);\"><\u002Fdiv>\n                <div style=\"width: 8px; height: 8px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.25);\"><\u002Fdiv>\n                <div style=\"width: 8px; height: 8px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.25);\"><\u002Fdiv>\n                <div style=\"width: 10px; height: 10px; border-radius: 50%; background: var(--gold); opacity: 0.7;\"><\u002Fdiv>\n                <div style=\"width: 8px; height: 8px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.25);\"><\u002Fdiv>\n                <div style=\"width: 8px; height: 8px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.25);\"><\u002Fdiv>\n                <div style=\"width: 8px; height: 8px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.25);\"><\u002Fdiv>\n                <div style=\"width: 8px; height: 8px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.25);\"><\u002Fdiv>\n                <div style=\"width: 8px; height: 8px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.25);\"><\u002Fdiv>\n                <div style=\"width: 8px; height: 8px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.25);\"><\u002Fdiv>\n                <div style=\"width: 8px; height: 8px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.25);\"><\u002Fdiv>\n                <div style=\"width: 8px; height: 8px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.25);\"><\u002Fdiv>\n                <div style=\"width: 8px; height: 8px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.25);\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg); font-weight: 500;\">Aerial Map<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim);\">Spatial overview from above<\u002Fspan>\n          <\u002Fdiv>\n          <!-- Frame 3: Agent POV -->\n          <div style=\"flex: 1; display: flex; flex-direction: column; gap: 14px;\">\n            <div style=\"height: 240px; border: 1.5px solid oklch(74% 0.14 74 / 0.3); border-radius: 6px; background: oklch(11% 0.04 72); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;\">\n              <div style=\"position: absolute; inset: 20px; border: 1px solid oklch(74% 0.14 74 / 0.18); border-radius: 2px;\"><\u002Fdiv>\n              <div style=\"position: absolute; inset: 48px; border: 1px solid oklch(74% 0.14 74 / 0.28); border-radius: 2px;\"><\u002Fdiv>\n              <div style=\"position: absolute; inset: 76px; border: 1px solid oklch(74% 0.14 74 / 0.42); border-radius: 2px;\"><\u002Fdiv>\n              <div style=\"position: absolute; inset: 104px; border: 1.5px solid var(--gold); border-radius: 2px; background: oklch(74% 0.14 74 / 0.05);\"><\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg); font-weight: 500;\">Agent POV<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim);\">Scene from a specific agent<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: var(--fg-dim); margin: 0; text-align: center; font-style: italic;\">A camera is any means of performing observations within the holon.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE: UNDERSTANDING CAMERAS -->\n  <section data-label=\"Understanding Cameras\" data-screen-label=\"24 — Understanding Cameras\" data-speaker-notes=\"The camera metaphor is deliberate. In a stage production a camera does not create the scene — it observes it, from a position, at an angle, with a field of view. In a holon, a camera is a named, declared observation point — technically a SPARQL CONSTRUCT or SELECT query bound to a projection IRI, but better thought of as a first-class entity within the scene. Three properties matter: cameras are scoped, not global — they see only what their position and angle allow; persistent, not one-shot — they keep observing as the event graph evolves, giving a live view; and composable — a containing holon's camera can aggregate the projections of its contained holons' cameras.\">\n    <div style=\"background: var(--bg2); width: 100%; height: 100%; display: flex; flex-direction: column; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: var(--gap-md);\">\n      <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Projection Layer · Cameras<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">Understanding cameras<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.5; opacity: 0.85; max-width: 1300px; text-wrap: pretty;\">A camera is a named, declared observation point — a <span style=\"color: var(--gold);\">SPARQL query bound to a projection IRI<\u002Fspan>, best understood as a first-class entity within the scene.<\u002Fp>\n      <div style=\"flex: 1; display: flex; gap: 32px; align-items: stretch;\">\n        <div style=\"flex: 1; background: oklch(16% 0.05 72); border-radius: 8px; padding: 40px; display: flex; flex-direction: column; gap: 16px; border-left: 3px solid var(--gold);\">\n          <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 42px; font-style: italic; font-weight: 300; color: var(--fg); margin: 0;\">Scoped<\u002Fp>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.6; text-wrap: pretty;\">Not global. HR's camera on an employee shows benefits; R&amp;D's shows projects. Same agent, different projections — neither more correct.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"flex: 1; background: oklch(16% 0.05 72); border-radius: 8px; padding: 40px; display: flex; flex-direction: column; gap: 16px; border-left: 3px solid var(--gold);\">\n          <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 42px; font-style: italic; font-weight: 300; color: var(--fg); margin: 0;\">Persistent<\u002Fp>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.6; text-wrap: pretty;\">Not one-shot. A camera keeps observing as the event graph evolves — presenting a live, current view rather than a static snapshot.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"flex: 1; background: oklch(16% 0.05 72); border-radius: 8px; padding: 40px; display: flex; flex-direction: column; gap: 16px; border-left: 3px solid var(--gold);\">\n          <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 42px; font-style: italic; font-weight: 300; color: var(--fg); margin: 0;\">Composable<\u002Fp>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.6; text-wrap: pretty;\">A company-level camera aggregates department-level cameras into one view — mirroring how holarchies stack perspectives.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE: CAMERAS AND PORTALS -->\n  <section data-label=\"Cameras and Portals\" data-screen-label=\"25 — Cameras and Portals\" data-speaker-notes=\"Cameras bear the same relationship to projections that portals bear to holons. A portal connects one holon to another, letting agent evolution in the source inform the destination without exposing the source's internal structure. A camera connects a holon to its observers, projecting agent state changes outward in curated form without exposing the scene graph. Both are mediation boundaries — neither carries internal state directly, only the effects of evolution. In a federated network, portals carry events between holons and cameras determine what those events look like to the receiving side. This separation is what makes holon architectures composable at scale: federation connects projections rather than merging graphs.\">\n    <div style=\"background: var(--bg-cool); width: 100%; height: 100%; display: flex; flex-direction: column; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: var(--gap-lg);\">\n      <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--teal);\">Mediation Boundaries<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">Cameras and portals<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; gap: 40px; align-items: stretch;\">\n        <div style=\"flex: 1; background: oklch(16% 0.05 195); border-radius: 8px; padding: 48px; display: flex; flex-direction: column; gap: 20px;\">\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); font-weight: 500; color: var(--teal); letter-spacing: 0.1em; text-transform: uppercase;\">Portal<\u002Fspan>\n          <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 46px; font-weight: 300; font-style: italic; color: var(--fg); margin: 0; line-height: 1.2;\">Holon → holon<\u002Fp>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.6; text-wrap: pretty;\">Connects one holon to another, letting agent evolution in the source inform the destination — without exposing the source's internal structure.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"flex: 1; background: oklch(16% 0.05 195); border-radius: 8px; padding: 48px; display: flex; flex-direction: column; gap: 20px;\">\n          <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); font-weight: 500; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase;\">Camera<\u002Fspan>\n          <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 46px; font-weight: 300; font-style: italic; color: var(--fg); margin: 0; line-height: 1.2;\">Holon → observers<\u002Fp>\n          <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.6; text-wrap: pretty;\">Projects agent state changes outward in curated form — without exposing the scene graph directly to the observer.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; text-align: center; opacity: 0.85; text-wrap: pretty; line-height: 1.5;\">Both carry the <span style=\"color: var(--teal);\">effects of evolution<\u002Fspan>, not internal state. Federation connects projections — rather than merging graphs.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 21: OPEN & CLOSED HOLONS -->\n  <section data-label=\"Open &amp; Closed Holons\" data-screen-label=\"26 — Open &amp; Closed Holons\" data-speaker-notes=\"Holons can be open or closed. An open holon accepts events, validates inputs, and presents dynamic views — analogous to a live, in-memory object. A closed holon no longer accepts events and represents either a complete narrative arc or an interrupted state caused by violations that couldn't be recovered from. This is analogous to an object that has been persisted to storage.\">\n    <div style=\"background: var(--bg2); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 520px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">State<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">Open and closed holons<\u002Fh2>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.6; opacity: 0.85; text-wrap: pretty;\">A holon is either <span style=\"color: oklch(67% 0.11 155);\">open<\u002Fspan> — accepting events, validating inputs, presenting dynamic views — or <span style=\"color: oklch(74% 0.14 74);\">closed<\u002Fspan>, representing a complete or interrupted narrative.<\u002Fp>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.7; font-style: italic;\">Analogous to an in-memory object versus one that has been persisted.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; align-items: center; justify-content: center;\">\n        <div style=\"display: flex; width: 960px; height: 460px; gap: 3px;\">\n          <!-- Open panel -->\n          <div style=\"flex: 1; background: oklch(17% 0.06 155); border-radius: 8px 0 0 8px; padding: 32px 36px; display: flex; flex-direction: column; gap: 20px;\">\n            <div style=\"display: flex; align-items: center; gap: 14px;\">\n              <div style=\"width: 12px; height: 12px; border-radius: 50%; background: oklch(67% 0.11 155); flex: none;\"><\u002Fdiv>\n              <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(67% 0.11 155); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500;\">Open<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"flex: 1; display: flex; flex-direction: column; gap: 16px; justify-content: center;\">\n              <div style=\"display: flex; gap: 14px; align-items: center;\">\n                <div style=\"width: 6px; height: 6px; border-radius: 50%; background: oklch(67% 0.11 155); flex: none;\"><\u002Fdiv>\n                <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg);\">Accepts events<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display: flex; gap: 14px; align-items: center;\">\n                <div style=\"width: 6px; height: 6px; border-radius: 50%; background: oklch(67% 0.11 155); flex: none;\"><\u002Fdiv>\n                <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg);\">Validates inputs<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display: flex; gap: 14px; align-items: center;\">\n                <div style=\"width: 6px; height: 6px; border-radius: 50%; background: oklch(67% 0.11 155); flex: none;\"><\u002Fdiv>\n                <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg);\">Presents dynamic views<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border-top: 1px solid oklch(67% 0.11 155 / 0.2); padding-top: 18px;\">\n              <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(67% 0.11 155 / 0.7); font-style: italic;\">→ in-memory object<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- Divider -->\n          <div style=\"width: 3px; background: oklch(74% 0.14 74 / 0.25); flex: none;\"><\u002Fdiv>\n          <!-- Closed panel -->\n          <div style=\"flex: 1; background: oklch(15% 0.05 72); border-radius: 0 8px 8px 0; padding: 32px 36px; display: flex; flex-direction: column; gap: 20px;\">\n            <div style=\"display: flex; align-items: center; gap: 14px;\">\n              <div style=\"width: 12px; height: 12px; border-radius: 50%; background: oklch(55% 0.06 72); flex: none;\"><\u002Fdiv>\n              <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(55% 0.06 72); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500;\">Closed<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"flex: 1; display: flex; flex-direction: column; gap: 16px; justify-content: center;\">\n              <div style=\"display: flex; gap: 14px; align-items: center;\">\n                <div style=\"width: 6px; height: 6px; border-radius: 50%; background: oklch(55% 0.06 72); flex: none;\"><\u002Fdiv>\n                <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg);\">No longer accepts events<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display: flex; gap: 14px; align-items: center;\">\n                <div style=\"width: 6px; height: 6px; border-radius: 50%; background: oklch(55% 0.06 72); flex: none;\"><\u002Fdiv>\n                <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg);\">Complete narrative arc<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display: flex; gap: 14px; align-items: flex-start;\">\n                <div style=\"width: 6px; height: 6px; border-radius: 50%; background: oklch(55% 0.06 72); flex: none; margin-top: 10px;\"><\u002Fdiv>\n                <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg); text-wrap: pretty;\">Interrupted if violations could not be recovered from<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border-top: 1px solid oklch(55% 0.06 72 / 0.2); padding-top: 18px;\">\n              <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(55% 0.06 72 / 0.7); font-style: italic;\">→ persisted object<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 22: HOW OPEN HOLONS EVOLVE -->\n  <section data-label=\"How Open Holons Evolve\" data-screen-label=\"27 — How Open Holons Evolve\" data-speaker-notes=\"Open holons use several mechanisms to determine their evolution. Bayesian priors base actions on previous behaviors. Active Inference measures the surprise between the expected and active state, driving the system toward lower uncertainty. State machines define rules-based state transitions. External actors are humans or other systems that directly control agents. Once closed, a holon becomes a record — the script of a play, the transcript of a meeting.\">\n    <div style=\"background: var(--bg-warm); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 520px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Evolution<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">How open holons evolve<\u002Fh2>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.6; opacity: 0.85; text-wrap: pretty;\">Open holons use several mechanisms to determine how they change over time.<\u002Fp>\n        <div style=\"height: 1px; background: oklch(74% 0.14 74 / 0.15);\"><\u002Fdiv>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.7; font-style: italic; text-wrap: pretty;\">Once closed, a holon becomes a record of that narrative — the script of a play, the transcript of a meeting.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; flex-direction: column; align-items: stretch; justify-content: center; gap: 24px;\">\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 24px; height: 500px;\">\n          <!-- Bayesian Priors -->\n          <div style=\"background: oklch(18% 0.06 72); border-radius: 8px; padding: 32px 36px; display: flex; flex-direction: column; gap: 16px; border-left: 3px solid var(--gold);\">\n            <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 44px; font-style: italic; font-weight: 300; color: var(--fg); margin: 0; line-height: 1.15;\">Bayesian Priors<\u002Fp>\n            <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.55; text-wrap: pretty;\">Actions informed by previous behaviors — the holon uses history to anticipate what to do next.<\u002Fp>\n          <\u002Fdiv>\n          <!-- Active Inference -->\n          <div style=\"background: oklch(16% 0.05 195); border-radius: 8px; padding: 32px 36px; display: flex; flex-direction: column; gap: 16px; border-left: 3px solid var(--teal);\">\n            <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 44px; font-style: italic; font-weight: 300; color: var(--fg); margin: 0; line-height: 1.15;\">Active Inference<\u002Fp>\n            <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.55; text-wrap: pretty;\">Measures surprise — the degree by which the expected state differs from the active state — driving toward lower uncertainty.<\u002Fp>\n          <\u002Fdiv>\n          <!-- State Machines -->\n          <div style=\"background: oklch(16% 0.05 195); border-radius: 8px; padding: 32px 36px; display: flex; flex-direction: column; gap: 16px; border-left: 3px solid var(--teal);\">\n            <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 44px; font-style: italic; font-weight: 300; color: var(--fg); margin: 0; line-height: 1.15;\">State Machines<\u002Fp>\n            <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.55; text-wrap: pretty;\">Rules-based transitions define what states are reachable and under what conditions they may be entered.<\u002Fp>\n          <\u002Fdiv>\n          <!-- External Actors -->\n          <div style=\"background: oklch(18% 0.06 72); border-radius: 8px; padding: 32px 36px; display: flex; flex-direction: column; gap: 16px; border-left: 3px solid var(--gold);\">\n            <p style=\"font-family: 'Cormorant Garamond', serif; font-size: 44px; font-style: italic; font-weight: 300; color: var(--fg); margin: 0; line-height: 1.15;\">External Actors<\u002Fp>\n            <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.55; text-wrap: pretty;\">Agents controlled from outside the holon — humans or other systems that directly direct its evolution.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 23: DATABOOKS -->\n  <section data-label=\"Databooks\" data-screen-label=\"28 — Databooks\" data-speaker-notes=\"Serialising holons is complex, so several implementations are moving toward a databook approach. A databook uses markdown as its substrate — a metadata header, zero or more code blocks, and regular markdown prose. Databooks can carry all the components of an in-flight holon, or act as data holons holding taxonomy, schema, queries, and application metadata. They are the messaging substrate of a holon architecture — equivalent to an HTML document, a play script, or a musical score. A triple store or object database can be abstracted as a deep databook or a store of multiple databooks.\">\n    <div style=\"background: var(--bg); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 520px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);\">Serialization<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">Databooks<\u002Fh2>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.6; opacity: 0.85; text-wrap: pretty;\">Markdown as a substrate — with a publishing-oriented <span style=\"color: var(--gold);\">metadata header<\u002Fspan> and zero or more <span style=\"color: var(--gold);\">code blocks<\u002Fspan>.<\u002Fp>\n        <div style=\"display: flex; flex-direction: column; gap: 18px;\">\n          <div style=\"display: flex; gap: 18px; align-items: flex-start;\">\n            <div style=\"width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex: none; margin-top: 11px;\"><\u002Fdiv>\n            <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.6; text-wrap: pretty;\">Carries all components of an in-flight holon, or stores data holons — taxonomy, schema, queries, and application metadata.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display: flex; gap: 18px; align-items: flex-start;\">\n            <div style=\"width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex: none; margin-top: 11px;\"><\u002Fdiv>\n            <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.6; text-wrap: pretty;\">The messaging substrate of a holon architecture — equivalent to an HTML document, a play script, or a musical score.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.7; font-style: italic; text-wrap: pretty;\">A triple store or object database can be abstracted as a deep databook, or as a store of multiple databooks.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; align-items: center; justify-content: center;\">\n        <div style=\"width: 660px; border: 1.5px solid oklch(74% 0.14 74 / 0.25); border-radius: 10px; background: oklch(10% 0.03 72); overflow: hidden;\">\n          <!-- Title bar -->\n          <div style=\"padding: 12px 20px; background: oklch(15% 0.04 72); border-bottom: 1px solid oklch(74% 0.14 74 / 0.12); display: flex; align-items: center; gap: 10px;\">\n            <div style=\"width: 10px; height: 10px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.25); flex: none;\"><\u002Fdiv>\n            <div style=\"width: 10px; height: 10px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.25); flex: none;\"><\u002Fdiv>\n            <div style=\"width: 10px; height: 10px; border-radius: 50%; background: oklch(74% 0.14 74 / 0.25); flex: none;\"><\u002Fdiv>\n            <span style=\"font-family: 'Courier New', monospace; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.4); margin-left: 8px;\">employee-holon.databook.md<\u002Fspan>\n          <\u002Fdiv>\n          <!-- Metadata frontmatter -->\n          <div style=\"padding: 18px 24px; border-bottom: 1px solid oklch(74% 0.14 74 / 0.1); background: oklch(12% 0.04 72);\">\n            <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;\">\n              <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.4); letter-spacing: 0.08em; text-transform: uppercase;\">metadata header<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-family: 'Courier New', monospace; font-size: var(--type-label); color: var(--teal); line-height: 1.7;\">---<\u002Fdiv>\n            <div style=\"font-family: 'Courier New', monospace; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.55); line-height: 1.7;\">title: <span style=\"color: var(--gold);\">\"Employee Holon\"<\u002Fspan><\u002Fdiv>\n            <div style=\"font-family: 'Courier New', monospace; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.55); line-height: 1.7;\">type: <span style=\"color: var(--gold);\">databook<\u002Fspan><\u002Fdiv>\n            <div style=\"font-family: 'Courier New', monospace; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.55); line-height: 1.7;\">state: <span style=\"color: oklch(67% 0.11 155);\">open<\u002Fspan><\u002Fdiv>\n            <div style=\"font-family: 'Courier New', monospace; font-size: var(--type-label); color: var(--teal); line-height: 1.7;\">---<\u002Fdiv>\n          <\u002Fdiv>\n          <!-- Markdown content -->\n          <div style=\"padding: 18px 24px; border-bottom: 1px solid oklch(74% 0.14 74 / 0.1);\">\n            <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;\">\n              <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.4); letter-spacing: 0.08em; text-transform: uppercase;\">markdown<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-family: 'Courier New', monospace; font-size: var(--type-label); color: var(--gold); line-height: 1.7; font-weight: 500;\"># Scene Graph<\u002Fdiv>\n            <div style=\"font-family: 'Courier New', monospace; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.45); line-height: 1.7;\">Agents, props, scenery, portals…<\u002Fdiv>\n            <div style=\"font-family: 'Courier New', monospace; font-size: var(--type-label); color: var(--gold); line-height: 1.7; font-weight: 500; margin-top: 6px;\"># Event Log<\u002Fdiv>\n            <div style=\"font-family: 'Courier New', monospace; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.45); line-height: 1.7;\">act, mutate, invalidate, clock…<\u002Fdiv>\n          <\u002Fdiv>\n          <!-- Code block -->\n          <div style=\"padding: 18px 24px; background: oklch(8% 0.02 72);\">\n            <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;\">\n              <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.4); letter-spacing: 0.08em; text-transform: uppercase;\">code block<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-family: 'Courier New', monospace; font-size: var(--type-label); color: var(--teal); line-height: 1.7;\">```sparql<\u002Fdiv>\n            <div style=\"font-family: 'Courier New', monospace; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.5); line-height: 1.7;\">SELECT ?agent WHERE {<\u002Fdiv>\n            <div style=\"font-family: 'Courier New', monospace; font-size: var(--type-label); color: oklch(74% 0.14 74 / 0.5); line-height: 1.7;\">&nbsp;&nbsp;?agent a <span style=\"color: var(--gold);\">hol:Character<\u002Fspan> . }<\u002Fdiv>\n            <div style=\"font-family: 'Courier New', monospace; font-size: var(--type-label); color: var(--teal); line-height: 1.7;\">```<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 24: HOLONS & AI (section break) -->\n  <section data-label=\"Holons &amp; AI\" data-screen-label=\"29 — Holons &amp; AI\" data-speaker-notes=\"We turn now to the intersection of holons and AI — three areas where the concepts we've covered become directly applicable: grounding language models, reducing the cost of authoring, and building intelligent bridges to data.\">\n    <div style=\"background: var(--bg-cool); width: 100%; height: 100%; display: flex; align-items: center;\">\n      <div style=\"flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px; padding: 0 var(--pad-x);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.28em; text-transform: uppercase; color: var(--teal);\">New Directions<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: 96px; font-weight: 300; color: var(--fg); margin: 0; letter-spacing: -1px; text-align: center;\">Holons &amp; AI<\u002Fh2>\n        <div style=\"width: 80px; height: 1px; background: var(--teal); opacity: 0.6;\"><\u002Fdiv>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-h2); font-weight: 300; color: var(--fg); margin: 0; opacity: 0.65; text-align: center; letter-spacing: 0.04em;\">Scope, grounding, and intelligent authorship<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 0 0 480px; height: 100%; display: flex; align-items: center; justify-content: center;\">\n        <div style=\"position: relative; width: 400px; height: 400px;\">\n          <div style=\"position: absolute; inset: 0; border-radius: 50%; border: 1px solid oklch(65% 0.10 195 / 0.12);\"><\u002Fdiv>\n          <div style=\"position: absolute; inset: 50px; border-radius: 50%; border: 1px solid oklch(65% 0.10 195 / 0.22);\"><\u002Fdiv>\n          <div style=\"position: absolute; inset: 100px; border-radius: 50%; border: 1px solid oklch(65% 0.10 195 / 0.36);\"><\u002Fdiv>\n          <div style=\"position: absolute; inset: 150px; border-radius: 50%; border: 1px solid oklch(65% 0.10 195 / 0.55);\"><\u002Fdiv>\n          <div style=\"position: absolute; inset: 200px; border-radius: 50%; border: 2px solid var(--teal); background: oklch(65% 0.10 195 / 0.12);\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SLIDE 25: GROUNDING LLMS -->\n  <section data-label=\"Grounding LLMs\" data-screen-label=\"30 — Grounding LLMs\" data-speaker-notes=\"One major cause of LLM hallucinations is a lack of scope — too much ambiguity in entity resolution. A set of databooks can provide exactly that scope. It identifies what entities are currently in play, records the history of those entities, defines rules and boundaries for state transitions, and determines how information is projected to the user. This won't completely eliminate hallucinations, but will make them considerably less likely — especially in chat interactions.\">\n    <div style=\"background: var(--bg); width: 100%; height: 100%; display: flex; align-items: center; padding: var(--pad-y) var(--pad-x); box-sizing: border-box; gap: 80px;\">\n      <div style=\"flex: 0 0 540px; display: flex; flex-direction: column; gap: var(--gap-md);\">\n        <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); letter-spacing: 0.22em; text-transform: uppercase; color: var(--teal);\">Hallucinations<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: var(--type-title); font-weight: 300; color: var(--fg); margin: 0; line-height: 1.1;\">Grounding LLMs with holons<\u002Fh2>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-body); color: var(--fg); margin: 0; line-height: 1.6; opacity: 0.85; text-wrap: pretty;\">A major cause of hallucinations is a <span style=\"color: var(--teal);\">lack of scope<\u002Fspan> — too much ambiguity in entity resolution.<\u002Fp>\n        <p style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg-dim); margin: 0; line-height: 1.7; text-wrap: pretty;\">Databooks provide that scope — making hallucinations far less likely, especially for chat interactions. They will not completely eliminate them, but they significantly reduce the ambiguity that causes them.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; align-items: center; justify-content: center;\">\n        <div style=\"width: 640px; border: 1.5px solid oklch(65% 0.10 195 / 0.28); border-radius: 10px; background: oklch(11% 0.04 195); overflow: hidden;\">\n          <div style=\"padding: 16px 28px; border-bottom: 1px solid oklch(65% 0.10 195 / 0.15);\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(65% 0.10 195 / 0.5); letter-spacing: 0.1em; text-transform: uppercase;\">Databook scope provides<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 20px; padding: 20px 28px; border-bottom: 1px solid oklch(65% 0.10 195 / 0.1);\">\n            <div style=\"width: 10px; height: 10px; border-radius: 50%; background: var(--teal); flex: none;\"><\u002Fdiv>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg); flex: 1;\">Entities currently in play<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(65% 0.10 195 / 0.5); font-style: italic; white-space: nowrap;\">Scene Graph<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 20px; padding: 20px 28px; border-bottom: 1px solid oklch(65% 0.10 195 / 0.1);\">\n            <div style=\"width: 10px; height: 10px; border-radius: 50%; background: var(--teal); flex: none;\"><\u002Fdiv>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg); flex: 1;\">History of each entity<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(65% 0.10 195 / 0.5); font-style: italic; white-space: nowrap;\">Event Graph<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 20px; padding: 20px 28px; border-bottom: 1px solid oklch(65% 0.10 195 / 0.1);\">\n            <div style=\"width: 10px; height: 10px; border-radius: 50%; background: var(--teal); flex: none;\"><\u002Fdiv>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg); flex: 1;\">Rules for state transitions<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(65% 0.10 195 / 0.5); font-style: italic; white-space: nowrap;\">Boundary<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 20px; padding: 20px 28px; border-bottom: 1px solid oklch(65% 0.10 195 / 0.1);\">\n            <div style=\"width: 10px; height: 10px; border-radius: 50%; background: var(--teal); flex: none;\"><\u002Fdiv>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-small); color: var(--fg); flex: 1;\">How information is projected to the user<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(65% 0.10 195 / 0.5); font-style: italic; white-space: nowrap;\">Projection Layer<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding: 16px 28px;\">\n            <span style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: var(--type-label); color: oklch(65% 0.10 195 / 0.55); font-style: italic;\">Each maps directly to a holon aspect.<\u002Fspan>\
